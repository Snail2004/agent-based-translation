 "attributes", "config": "S0", "source_text": "It might go without saying that you cannot do data science without data.\nWe could lose hundreds of pages pondering what precisely constitutes data,\nbut for now, we will err on the practical side\nand focus on the key properties to be concerned with.\nGenerally, we are concerned with a collection of examples.\nIn order to work with data usefully, \nwe typically\nneed to come up with a suitable numerical representation.\nEach *example* (or *data point*, *data instance*, *sample*) typically consists of a set\nof attributes called *features* (or *covariates*),\nfrom which the model must make its predictions.\nIn the supervised learning problems above,\nthe thing to predict\nis a special attribute \nthat is designated as\nthe *label* (or *target*).", "source_start": 508, "source_end": 518, "target_text": "Có lẽ không cần nói cũng biết rằng bạn không thể làm khoa học dữ liệu nếu không có dữ liệu. Chúng ta có thể mất hàng trăm trang để suy ngẫm về chính xác điều gì cấu thành nên dữ liệu, nhưng hiện tại, chúng ta sẽ nghiêng về phía thực tiễn và tập trung vào những đặc tính then chốt cần quan tâm. Nói chung, chúng ta quan tâm đến một tập hợp các ví dụ. Để làm việc với dữ liệu một cách hữu ích, chúng ta thường cần đưa ra một biểu diễn số học phù hợp. Mỗi *ví dụ* (hoặc *điểm dữ liệu*, *thực thể dữ liệu*, *mẫu*) thường gồm một tập các thuộc tính gọi là *đặc trưng* (hoặc *biến đồng biến*), từ đó mô hình phải đưa ra dự đoán của mình. Trong các bài toán học có giám sát ở trên, thứ cần dự đoán là một thuộc tính đặc biệt được chỉ định là *nhãn* (hoặc *mục tiêu*).", "candidates": [{"start": 533, "end": 543, "surface": "thuộc tính", "role": "collision", "term_ids": ["registry:attributes", "registry:features", "registry:properties"], "form": "thuộc tính", "credited": false}, {"start": 552, "end": 561, "surface": "đặc trưng", "role": "collision", "term_ids": ["registry:attributes", "registry:features"], "form": "đặc trưng", "credited": fa ường cần đưa ra một biểu diễn số học phù hợp. Mỗi *ví dụ* (hoặc *điểm dữ liệu*, *thực thể dữ liệu*, *mẫu*) thường gồm một tập các thuộc tính gọi là *đặc trưng* (hoặc *biến đồng biến*), từ đó mô hình phải đưa ra dự đoán của mình. Trong các bài toán học có giám sát ở trên, thứ cần dự đoán là một thuộc tính đặc biệt được chỉ định là *nhãn* (hoặc *mục tiêu*).", "block_is_multi_sentence": "true", "candidate_target_spans": "[{\"start\": 533, \"end\": 543, \"surface\": \"thuộc tính\", \"role\": \"collision\", \"term_ids\": [\"registry:attributes\", \"registry:features\", \"registry:properties\"], \"form\": \"thuộc tính\", \"credited\": false}, {\"start\": 552, \"end\": 561, \"surface\": \"đặc trưng\", \"role\": \"collision\", \"term_ids\": [\"registry:attributes\", \"registry:features\"], \"form\": \"đặc trưng\", \"credited\": false}, {\"start\": 698, \"end\": 708, \"surface\": \"thuộc tính\", \"role\": \"collision\", \"term_ids\": [\"registry:attributes\", \"registry:features\", \"registry:properties\"], \"form\": \"thuộc tính\", \"credited\": false}]", "candidate_target_forms": "thuộc tính | đặc trưng", "candidate_term_ids": "registry:attributes | registry:features | registry:properties", "ev08_role": "collision", "gold_target_span": "533:543", "gold_label": "rendered", "annotator_note": "[H]"}}, {"probe_type": "true_collision", "source_occ_id": "S0:d2l_introduction_index_b062:registry:outcome:0", "source_term": "outcome", "config": "S0", "source_text": "Now, assume that you built a classifier and trained it\nto predict if a mushroom is poisonous based on a photograph.\nSay our poison-detection classifier outputs\nthat the probability that\n:numref:`fig_death_cap` contains a death cap is 0.2.\nIn other words, the classifier is 80\\% sure\nthat our mushroom is not a death cap.\nStill, you would have to be a fool to eat it.\nThat is because the certain benefit of a delicious dinner\nis not worth a 20\\% risk of dying from it.\nIn other words, the effect of the uncertain risk\noutweighs the benefit by far.\nThus, we need to compute the expected risk that we incur as the loss function,\ni.e., we need to multiply the probability of the outcome\nwith the benefit (or harm) associated with it.\nIn this case,\nthe loss incurred by eating the mushroom\ncan be $0.2 \\times \\infty + 0.8 \\times 0 = \\infty$,\nwhereas the loss of discarding it is\n$0.2 \\times 0 + 0.8 \\times 1 = 0.8$.\nOur caution was justified:\nas any mycologist would tell us,\nthe mushroom in :numref:`fig_death_cap` actually\nis a death cap.", "source_start": 675, "source_end": 682, "target_text": "Bây giờ, giả sử rằng bạn đã xây dựng một bộ phân loại và huấn luyện nó để dự đoán liệu một cây nấm có độc hay không dựa trên một bức ảnh. Giả sử bộ phân loại phát hiện độc của chúng ta cho biết xác suất rằng :numref:`fig_death_cap` chứa một cây death cap là 0.2. Nói cách khác, bộ phân loại chắc chắn 80\\% rằng cây nấm của chúng ta không phải là death cap. Tuy vậy, bạn sẽ phải là kẻ ngốc nếu ăn nó. Đó là vì lợi ích chắc chắn của một bữa tối ngon lành không đáng để đánh đổi với rủi ro 20\\% là chết vì nó. Nói cách khác, tác động của rủi ro không chắc chắn lớn hơn rất nhiều so với lợi ích. Vì vậy, chúng ta cần tính toán rủi ro kỳ vọng mà ta gánh chịu như là hàm mất mát, tức là ta cần nhân xác suất của kết quả với lợi ích (hoặc tác hại) gắn với nó. Trong trường hợp này, mất mát khi ăn cây nấm có thể là $0.2 \\times \\infty + 0.8 \\times 0 = \\infty$, trong khi mất mát khi vứt bỏ nó là $0.2 \\times 0 + 0.8 \\times 1 = 0.8$. Sự thận trọng của chúng ta là có cơ sở: như bất kỳ nhà nấm học nào cũng sẽ nói với chúng ta, cây nấm trong :numref:`fig_death_cap` thực ra là một cây death cap.", "candidates": [{"start": 706, "end": 713, "surface": "kết quả", "role": "collision", "term_ids": ["registry:outcome", "registry:outputs"], "form": "kết quả", "credited": false}], "gold_label": "rendered", "gold_target_span": "706:713", "annotator_note": "[H]", "_row": {"probe_type": "true_collision", "block_id": "d2l_introduction_index_b062", "chapter": "d2l_introduction", "config": "S0", "source_term": "outcome", "source_term_id": "registry:outcome", "source_occ_id": "S0:d2l_introduction_index_b062:registry:outcome:0", "source_span": "675:682:outcome", "source_sentence": "Thus, we need to compute the expected risk that we incur as the loss function,\ni.e., we need to multiply the probability of the outcome\nwith the benefit (or harm) associated with it.", "source_text": "Now, assume that you built a classifier and trained it\nto predict if a mushroom is poisonous based on a photograph.\nSay our poison-detection classifier outputs\nthat the probability that\n:numref:`fig_death_cap` contains a death cap is 0.2.\nIn other words, the classifier is 80\\% sure\nthat our mushroom is not a death cap.\nStill, you would have to be a fool to eat it.\nThat is because the certain benefit of a delicious dinner\nis not worth a 20\\% risk of dying from it.\nIn other words, the effect of the uncertain risk\noutweighs the benefit by far.\nThus, we need to compute the expected risk that we incur as the loss function,\ni.e., we need to multiply the probability of the outcome\nwith the benefit (or harm) associated with it.\nIn this case,\nthe loss incurred by eating the mushroom\ncan be $0.2 \\times \\infty + 0.8 \\times 0 = \\infty$,\nwhereas the loss of discarding it is\n$0.2 \\times 0 + 0.8 \\times 1 = 0.8$.\nOur caution was justified:\nas any mycologist would tell us,\nthe mushroom in :numref:`fig_death_cap` actually\nis a death cap.", "target_text": "Bây giờ, giả sử rằng bạn đã xây dựng một bộ phân loại và huấn luyện nó để dự đoán liệu một cây nấm có độc hay không dựa trên một bức ảnh. Giả sử bộ phân loại phát hiện độc của chúng ta cho biết xác suất rằng :numref:`fig_death_cap` chứa một cây death cap là 0.2. Nói cách khác, bộ phân loại chắc chắn 80\\% rằng cây nấm của chúng ta không phải là death cap. Tuy vậy, bạn sẽ phải là kẻ ngốc nếu ăn nó. Đó là vì lợi ích chắc chắn của một bữa tối ngon lành không đáng để đánh đổi với rủi ro 20\\% là chết vì nó. Nói cách khác, tác động của rủi ro không chắc chắn lớn hơn rất nhiều so với lợi ích. Vì vậy, chúng ta cần tính toán rủi ro kỳ vọng mà ta gánh chịu như là hàm mất mát, tức là ta cần nhân xác suất của kết quả với lợi ích (hoặc tác hại) gắn với nó. Trong trường hợp này, mất mát khi ăn cây nấm có thể là $0.2 \\times \\infty + 0.8 \\times 0 = \\infty$, trong khi mất mát khi vứt bỏ nó là $0.2 \\times 0 + 0.8 \\times 1 = 0.8$. Sự thận trọng của chúng ta là có cơ sở: như bất kỳ nhà nấm học nào cũng sẽ nói với chúng ta, cây nấm trong :numref:`fig_death_cap` thực ra là một cây death cap.", "block_is_multi_sentence": "true", "candidate_target_spans": "[{\"start\": 706, \"end\": 713, \"surface\": \"kết quả\", \"role\": \"collision\", \"term_ids\": [\"registry:outcome\", \"registry:outputs\"], \"form\": \"kết quả\", \"credited\": false}]", "candidate_target_forms": "kết quả", "candidate_term_ids": "registry:outcome | registry:outputs", "ev08_role": "collision", "gold_target_span": "706:713", "gold_label": "rendered", "annotator_note": "[H]"}}, {"probe_type": "true_collision", "source_occ_id": "S0:d2l_introduction_index_b134:registry:sequence:2", "source_term": "sequence", "config": "S0", "source_text": "* Novel methods for capacity control, such as *dropout*\n  :cite:`Srivastava.Hinton.Krizhevsky.ea.2014`,\n  have helped to mitigate the danger of overfitting.\n  This was achieved by applying noise injection :cite:`Bishop.1995`\n  throughout the neural network, replacing weights by random variables\n  for training purposes.\n* Attention mechanisms solved a second problem\n  that had plagued statistics for over a century:\n  how to increase the memory and complexity of a system without\n  increasing the number of learnable parameters.\n  Researchers found an elegant solution\n  by using what can only be viewed as a learnable pointer structure :cite:`Bahdanau.Cho.Bengio.2014`.\n  Rather than having to remember an entire text sequence, e.g.,\n  for machine translation in a fixed-dimensional representation,\n  all that needed to be stored was a pointer to the intermediate state\n  of the translation process. This allowed for significantly\n  increased accuracy for long sequences, since the model\n  no longer needed to remember the entire sequence before\n  commencing the generation of a new sequence.\n* Multi-stage designs, e.g., via the memory networks \n  :cite:`Sukhbaatar.Weston.Fergus.ea.2015` and the neural programmer-interpreter :cite:`Reed.De-Freitas.2015`\n  allowed statistical modelers to describe iterative approaches to reasoning. These tools allow for an internal state of the deep neural network\n  to be modified repeatedly, thus carrying out subsequent steps\n  in a chain of reasoning, similar to how a processor\n  can modify memory for a computation.\n* Another key development was the invention of generative adversarial networks\n  :cite:`Goodfellow.Pouget-Abadie.Mirza.ea.2014`.\n  Traditionally, statistical methods for density estimation\n  and generative models focused on finding proper probability distributions\n  and (often approximate) algorithms for sampling from them.\n  As a result, these algorithms were largely limited by the lack of\n  flexibility inherent in the statistical models.\n  The crucial innovation in generative adversarial networks was to replace the sampler\n  by an arbitrary algorithm with differentiable parameters.\n  These are then adjusted in such a way that the discriminator\n  (effectively a two-sample test) cannot distinguish fake from real data.\n  Through the ability to use arbitrary algorithms to generate data,\n  it opened up density estimation to a wide variety of techniques.\n  Examples of galloping Zebras :cite:`Zhu.Park.Isola.ea.2017`\n  and of fake celebrity faces :cite:`Karras.Aila.Laine.ea.2017`\n  are both testimony to this progress.\n  Even amateur doodlers can produce\n  photorealistic images based on just sketches that describe\n  how the layout of a scene looks like :cite:`Park.Liu.Wang.ea.2019`.\n* In many cases, a single GPU is insufficient to process\n  the large amounts of data available for training.\n  Over the past decade the ability to build parallel and\n  distributed training algorithms has improved significantly.\n  One of the key challenges in designing scalable algorithms\n  is that the workhorse of deep learning optimization,\n  stochastic gradient descent, relies on relatively\n  small minibatches of data to be processed.\n  At the same time, small batches limit the efficiency of GPUs.\n  Hence, training on 1024 GPUs with a minibatch size of,\n  say 32 images per batch amounts to an aggregate minibatch\n  of about 32000 images. Recent work, first by Li :cite:`Li.2017`,\n  and subsequently by :cite:`You.Gitman.Ginsburg.2017`\n  and :cite:`Jia.Song.He.ea.2018` pushed the size up to 64000 observations,\n  reducing training time for the ResNet-50 model on the ImageNet dataset to less than 7 minutes.\n  For comparison---initially training times were measured in the order of days.\n* The ability to parallelize computation has also contributed quite crucially\n  to progress in reinforcement learning, at least whenever simulation is an\n  option. This has led to significant progress in computers achieving\n  superhuman performance in Go, Atari games, Starcraft, and in physics\n  simulations (e.g., using MuJoCo). See e.g.,\n  :cite:`Silver.Huang.Maddison.ea.2016` for a description\n  of how to achieve this in AlphaGo. In a nutshell,\n  reinforcement learning works best if plenty of (state, action, reward) triples are available, i.e., whenever it is possible to try out lots of things to learn how they relate to each\n  other. Simulation provides such an avenue.\n* Deep learning frameworks have played a crucial role\n  in disseminating ideas. The first generation of frameworks\n  allowing for easy modeling encompassed\n  [Caffe](https://github.com/BVLC/caffe),\n  [Torch](https://github.com/torch), and\n  [Theano](https://github.com/Theano/Theano).\n  Many seminal papers were written using these tools.\n  By now, they have been superseded by\n  [TensorFlow](https://github.com/tensorflow/tensorflow) (often used via its high level API [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), and [Apache MXNet](https://github.com/apache/incubator-mxnet). The third generation of tools, namely imperative tools for deep learning,\n  was arguably spearheaded by [Chainer](https://github.com/chainer/chainer),\n  which used a syntax similar to Python NumPy to describe models.\n  This idea was adopted by both [PyTorch](https://github.com/pytorch/pytorch),\n  the [Gluon API](https://github.com/apache/incubator-mxnet) of MXNet, and [Jax](https://github.com/google/jax).", "source_start": 1086, "source_end": 1094, "target_text": "* Các phương pháp mới để kiểm soát năng lực, chẳng hạn như *dropout* :cite:`Srivastava.Hinton.Krizhevsky.ea.2014`, đã giúp giảm thiểu nguy cơ quá khớp. Điều này đạt được bằng cách áp dụng nhiễu :cite:`Bishop.1995` xuyên suốt mạng nơ-ron, thay thế các trọng số bằng các biến ngẫu nhiên cho mục đích huấn luyện. * Cơ chế chú ý đã giải quyết một vấn đề thứ hai vốn đã làm khổ ngành thống kê trong hơn một thế kỷ: làm thế nào để tăng bộ nhớ và độ phức tạp của một hệ thống mà không làm tăng số lượng tham số có thể học. Các nhà nghiên cứu đã tìm ra một giải pháp thanh lịch bằng cách sử dụng thứ chỉ có thể xem như một cấu trúc con trỏ có thể học được :cite:`Bahdanau.Cho.Bengio.2014`. Thay vì phải ghi nhớ toàn bộ một chuỗi văn bản, ví dụ như trong dịch máy với biểu diễn có số chiều cố định, tất cả những gì cần lưu trữ chỉ là một con trỏ tới trạng thái trung gian của quá trình dịch. Điều này cho phép tăng đáng kể độ chính xác đối với các chuỗi dài, vì mô hình không còn cần phải ghi nhớ toàn bộ chuỗi trước khi bắt đầu sinh ra một chuỗi mới. * Các thiết kế nhiều giai đoạn, ví dụ thông qua memory networks :cite:`Sukhbaatar.Weston.Fergus.ea.2015` và neural programmer-interpreter :cite:`Reed.De-Freitas.2015`, cho phép các nhà mô hình hóa thống kê mô tả các cách tiếp cận suy luận theo kiểu lặp. Những công cụ này cho phép trạng thái bên trong của mạng nơ-ron sâu được sửa đổi nhiều lần, qua đó thực hiện các bước tiếp theo trong một chuỗi suy luận, tương tự như cách một bộ xử lý có thể sửa đổi bộ nhớ cho một phép tính. * Một phát triển quan trọng khác là sự ra đời của generative adversarial networks :cite:`Goodfellow.Pouget-Abadie.Mirza.ea.2014`. Theo truyền thống, các phương pháp thống kê cho ước lượng mật độ và các mô hình sinh tập trung vào việc tìm các phân phối xác suất phù hợp và các thuật toán (thường là xấp xỉ) để lấy mẫu từ chúng. Kết quả là, các thuật toán này phần lớn bị giới hạn bởi sự thiếu linh hoạt vốn có trong các mô hình thống kê. Đổi mới then chốt trong generative adversarial networks là thay bộ lấy mẫu bằng một thuật toán bất kỳ với các tham số khả vi. Sau đó, các tham số này được điều chỉnh sao cho bộ phân biệt (thực chất là một kiểm định hai mẫu) không thể phân biệt dữ liệu giả với dữ liệu thật. Nhờ khả năng sử dụng các thuật toán tùy ý để sinh dữ liệu, nó đã mở rộng ước lượng mật độ sang rất nhiều kỹ thuật khác nhau. Các ví dụ về ngựa vằn đang phi nước đại :cite:`Zhu.Park.Isola.ea.2017` và về khuôn mặt người nổi tiếng giả :cite:`Karras.Aila.Laine.ea.2017` đều là minh chứng cho tiến bộ này. Ngay cả những người vẽ nguệch ngoạc nghiệp dư cũng có thể tạo ra các hình ảnh chân thực như ảnh chụp dựa chỉ trên các phác thảo mô tả bố cục của một cảnh trông như thế nào :cite:`Park.Liu.Wang.ea.2019`. * Trong nhiều trường hợp, một GPU đơn lẻ là không đủ để xử lý lượng dữ liệu lớn sẵn có cho huấn luyện. Trong thập kỷ qua, khả năng xây dựng các thuật toán huấn luyện song song và phân tán đã được cải thiện đáng kể. Một trong những thách thức chính khi thiết kế các thuật toán có khả năng mở rộng là công cụ làm việc chủ lực của tối ưu hóa học sâu, stochastic gradient descent, dựa vào các minibatch dữ liệu tương đối nhỏ để xử lý. Đồng thời, các batch nhỏ làm hạn chế hiệu quả của GPU. Do đó, huấn luyện trên 1024 GPU với kích thước minibatch, chẳng hạn 32 ảnh mỗi batch, tương đương với một minibatch tổng hợp khoảng 32000 ảnh. Các công trình gần đây, bắt đầu từ Li :cite:`Li.2017`, và sau đó là :cite:`You.Gitman.Ginsburg.2017` và :cite:`Jia.Song.He.ea.2018`, đã nâng quy mô lên 64000 quan sát, giảm thời gian huấn luyện cho mô hình ResNet-50 trên bộ dữ liệu ImageNet xuống dưới 7 phút. Để so sánh---ban đầu thời gian huấn luyện được đo theo đơn vị ngày. * Khả năng song song hóa tính toán cũng đã đóng góp rất quan trọng vào tiến bộ trong học tăng cường, ít nhất là bất cứ khi nào mô phỏng là một lựa chọn. Điều này đã dẫn đến những tiến bộ đáng kể khi máy tính đạt hiệu năng vượt con người trong Go, các trò chơi Atari, Starcraft, và trong các mô phỏng vật lý (ví dụ, sử dụng MuJoCo). Xem chẳng hạn :cite:`Silver.Huang.Maddison.ea.2016` để biết mô tả về cách đạt được điều này trong AlphaGo. Tóm lại, học tăng cường hoạt động tốt nhất nếu có sẵn nhiều bộ ba (trạng thái, hành động, phần thưởng), tức là bất cứ khi nào có thể thử rất nhiều thứ để học cách chúng liên hệ với nhau. Mô phỏng cung cấp một con đường như vậy. * Các framework học sâu đã đóng vai trò then chốt trong việc phổ biến các ý tưởng. Thế hệ framework đầu tiên cho phép mô hình hóa dễ dàng bao gồm [Caffe](https://github.com/BVLC/caffe), [Torch](https://github.com/torch), và [Theano](https://github.com/Theano/Theano). Nhiều bài báo nền tảng đã được viết bằng các công cụ này. Cho đến nay, chúng đã bị thay thế bởi [TensorFlow](https://github.com/tensorflow/tensorflow) (thường được dùng thông qua API cấp cao [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), và [Apache MXNet](https://github.com/apache/incubator-mxnet). Thế hệ công cụ thứ ba, cụ thể là các công cụ mệ with differentiable parameters.\n  These are then adjusted in such a way that the discriminator\n  (effectively a two-sample test) cannot distinguish fake from real data.\n  Through the ability to use arbitrary algorithms to generate data,\n  it opened up density estimation to a wide variety of techniques.\n  Examples of galloping Zebras :cite:`Zhu.Park.Isola.ea.2017`\n  and of fake celebrity faces :cite:`Karras.Aila.Laine.ea.2017`\n  are both testimony to this progress.\n  Even amateur doodlers can produce\n  photorealistic images based on just sketches that describe\n  how the layout of a scene looks like :cite:`Park.Liu.Wang.ea.2019`.\n* In many cases, a single GPU is insufficient to process\n  the large amounts of data available for training.\n  Over the past decade the ability to build parallel and\n  distributed training algorithms has improved significantly.\n  One of the key challenges in designing scalable algorithms\n  is that the workhorse of deep learning optimization,\n  stochastic gradient descent, relies on relatively\n  small minibatches of data to be processed.\n  At the same time, small batches limit the efficiency of GPUs.\n  Hence, training on 1024 GPUs with a minibatch size of,\n  say 32 images per batch amounts to an aggregate minibatch\n  of about 32000 images. Recent work, first by Li :cite:`Li.2017`,\n  and subsequently by :cite:`You.Gitman.Ginsburg.2017`\n  and :cite:`Jia.Song.He.ea.2018` pushed the size up to 64000 observations,\n  reducing training time for the ResNet-50 model on the ImageNet dataset to less than 7 minutes.\n  For comparison---initially training times were measured in the order of days.\n* The ability to parallelize computation has also contributed quite crucially\n  to progress in reinforcement learning, at least whenever simulation is an\n  option. This has led to significant progress in computers achieving\n  superhuman performance in Go, Atari games, Starcraft, and in physics\n  simulations (e.g., using MuJoCo). See e.g.,\n  :cite:`Silver.Huang.Maddison.ea.2016` for a description\n  of how to achieve this in AlphaGo. In a nutshell,\n  reinforcement learning works best if plenty of (state, action, reward) triples are available, i.e., whenever it is possible to try out lots of things to learn how they relate to each\n  other. Simulation provides such an avenue.\n* Deep learning frameworks have played a crucial role\n  in disseminating ideas. The first generation of frameworks\n  allowing for easy modeling encompassed\n  [Caffe](https://github.com/BVLC/caffe),\n  [Torch](https://github.com/torch), and\n  [Theano](https://github.com/Theano/Theano).\n  Many seminal papers were written using these tools.\n  By now, they have been superseded by\n  [TensorFlow](https://github.com/tensorflow/tensorflow) (often used via its high level API [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), and [Apache MXNet](https://github.com/apache/incubator-mxnet). The third generation of tools, namely imperative tools for deep learning,\n  was arguably spearheaded by [Chainer](https://github.com/chainer/chainer),\n  which used a syntax similar to Python NumPy to describe models.\n  This idea was adopted by both [PyTorch](https://github.com/pytorch/pytorch),\n  the [Gluon API](https://github.com/apache/incubator-mxnet) of MXNet, and [Jax](https://github.com/google/jax).", "target_text": "* Các phương pháp mới để kiểm soát năng lực, chẳng hạn như *dropout* :cite:`Srivastava.Hinton.Krizhevsky.ea.2014`, đã giúp giảm thiểu nguy cơ quá khớp. Điều này đạt được bằng cách áp dụng nhiễu :cite:`Bishop.1995` xuyên suốt mạng nơ-ron, thay thế các trọng số bằng các biến ngẫu nhiên cho mục đích huấn luyện. * Cơ chế chú ý đã giải quyết một vấn đề thứ hai vốn đã làm khổ ngành thống kê trong hơn một thế kỷ: làm thế nào để tăng bộ nhớ và độ phức tạp của một hệ thống mà không làm tăng số lượng tham số có thể học. Các nhà nghiên cứu đã tìm ra một giải pháp thanh lịch bằng cách sử dụng thứ chỉ có thể xem như một cấu trúc con trỏ có thể học được :cite:`Bahdanau.Cho.Bengio.2014`. Thay vì phải ghi nhớ toàn bộ một chuỗi văn bản, ví dụ như trong dịch máy với biểu diễn có số chiều cố định, tất cả những gì cần lưu trữ chỉ là một con trỏ tới trạng thái trung gian của quá trình dịch. Điều này cho phép tăng đáng kể độ chính xác đối với các chuỗi dài, vì mô hình không còn cần phải ghi nhớ toàn bộ chuỗi trước khi bắt đầu sinh ra một chuỗi mới. * Các thiết kế nhiều giai đoạn, ví dụ thông qua memory networks :cite:`Sukhbaatar.Weston.Fergus.ea.2015` và neural programmer-interpreter :cite:`Reed.De-Freitas.2015`, cho phép các nhà mô hình hóa thống kê mô tả các cách tiếp cận suy luận theo kiểu lặp. Những công cụ này cho phép trạng thái bên trong của mạng nơ-ron sâu được sửa đổi nhiều lần, qua đó thực hiện các bước tiếp theo trong một chuỗi suy luận, tương tự như cách một bộ xử lý có thể sửa đổi bộ nhớ cho một phép tính. * Một phát triển quan trọng khác là sự ra đời của generative adversarial networks :cite:`Goodfellow.Pouget-Abadie.Mirza.ea.2014`. Theo truyền thống, các phương pháp thống kê cho ước lượng mật độ và các mô hình sinh tập trung vào việc tìm các phân phối xác suất phù hợp và các thuật toán (thường là xấp xỉ) để lấy mẫu từ chúng. Kết quả là, các thuật toán này phần lớn bị giới hạn bởi sự thiếu linh hoạt vốn có trong các mô hình thống kê. Đổi mới then chốt trong generative adversarial networks là thay bộ lấy mẫu bằng một thuật toán bất kỳ với các tham số khả vi. Sau đó, các tham số này được điều chỉnh sao cho bộ phân biệt (thực chất là một kiểm định hai mẫu) không thể phân biệt dữ liệu giả với dữ liệu thật. Nhờ khả năng sử dụng các thuật toán tùy ý để sinh dữ liệu, nó đã mở rộng ước lượng mật độ sang rất nhiều kỹ thuật khác nhau. Các ví dụ về ngựa vằn đang phi nước đại :cite:`Zhu.Park.Isola.ea.2017` và về khuôn mặt người nổi tiếng giả :cite:`Karras.Aila.Laine.ea.2017` đều là minh chứng cho tiến bộ này. Ngay cả những người vẽ nguệch ngoạc nghiệp dư cũng có thể tạo ra các hình ảnh chân thực như ảnh chụp dựa chỉ trên các phác thảo mô tả bố cục của một cảnh trông như thế nào :cite:`Park.Liu.Wang.ea.2019`. * Trong nhiều trường hợp, một GPU đơn lẻ là không đủ để xử lý lượng dữ liệu lớn sẵn có cho huấn luyện. Trong thập kỷ qua, khả năng xây dựng các thuật toán huấn luyện song song và phân tán đã được cải thiện đáng kể. Một trong những thách thức chính khi thiết kế các thuật toán có khả năng mở rộng là công cụ làm việc chủ lực của tối ưu hóa học sâu, stochastic gradient descent, dựa vào các minibatch dữ liệu tương đối nhỏ để xử lý. Đồng thời, các batch nhỏ làm hạn chế hiệu quả của GPU. Do đó, huấn luyện trên 1024 GPU với kích thước minibatch, chẳng hạn 32 ảnh mỗi batch, tương đương với một minibatch tổng hợp khoảng 32000 ảnh. Các công trình gần đây, bắt đầu từ Li :cite:`Li.2017`, và sau đó là :cite:`You.Gitman.Ginsburg.2017` và :cite:`Jia.Song.He.ea.2018`, đã nâng quy mô lên 64000 quan sát, giảm thời gian huấn luyện cho mô hình ResNet-50 trên bộ dữ liệu ImageNet xuống dưới 7 phút. Để so sánh---ban đầu thời gian huấn luyện được đo theo đơn vị ngày. * Khả năng song song hóa tính toán cũng đã đóng góp rất quan trọng vào tiến bộ trong học tăng cường, ít nhất là bất cứ khi nào mô phỏng là một lựa chọn. Điều này đã dẫn đến những tiến bộ đáng kể khi máy tính đạt hiệu năng vượt con người trong Go, các trò chơi Atari, Starcraft, và trong các mô phỏng vật lý (ví dụ, sử dụng MuJoCo). Xem chẳng hạn :cite:`Silver.Huang.Maddison.ea.2016` để biết mô tả về cách đạt được điều này trong AlphaGo. Tóm lại, học tăng cường hoạt động tốt nhất nếu có sẵn nhiều bộ ba (trạng thái, hành động, phần thưởng), tức là bất cứ khi nào có thể thử rất nhiều thứ để học cách chúng liên hệ với nhau. Mô phỏng cung cấp một con đường như vậy. * Các framework học sâu đã đóng vai trò then chốt trong việc phổ biến các ý tưởng. Thế hệ framework đầu tiên cho phép mô hình hóa dễ dàng bao gồm [Caffe](https://github.com/BVLC/caffe), [Torch](https://github.com/torch), và [Theano](https://github.com/Theano/Theano). Nhiều bài báo nền tảng đã được viết bằng các công cụ này. Cho đến nay, chúng đã bị thay thế bởi [TensorFlow](https://github.com/tensorflow/tensorflow) (thường được dùng thông qua API cấp cao [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), và [Apache MXNet](https://github.com/apache/incubator-mxnet). Thế hệ công cụ thứ ba, cụ thể là các công cụ mệnh lệnh cho học sâu, có thể nói đã được tiên phong bởi [Chainer](https://github.com/chainer/chainer), vốn dùng cú pháp tương tự Python NumPy để mô tả các mô hình. Ý tưởng này đã được cả [PyTorch](https://github.com/pytorch/pytorch), [Gluon API](https://github.com/apache/incubator-mxnet) của MXNet, và [Jax](https://github.com/google/jax) tiếp thu.", "block_is_multi_sentence": "true", "candidate_target_spans": "[{\"start\": 715, \"end\": 720, \"surface\": \"chuỗi\", \"role\": \"collision\", \"term_ids\": [\"registry:sequence\", \"registry:sequences\"], \"form\": \"chuỗi\", \"credited\": false}, {\"start\": 939, \"end\": 944, \"surface\": \"chuỗi\", \"role\": \"collision\", \"term_ids\": [\"registry:sequence\", \"registry:sequences\"], \"form\": \"chuỗi\", \"credited\": false}, {\"start\": 996, \"end\": 1001, \"surface\": \"chuỗi\", \"role\": \"collision\", \"term_ids\": [\"registry:sequence\", \"registry:sequences\"], \"form\": \"chuỗi\", \"credited\": false}, {\"start\": 1032, \"end\": 1037, \"surface\": \"chuỗi\", \"role\": \"collision\", \"term_ids\": [\"registry:sequence\", \"registry:sequences\"], \"form\": \"chuỗi\", \"credited\": false}, {\"start\": 1435, \"end\": 1440, \"surface\": \"chuỗi\", \"role\": \"collision\", \"term_ids\": [\"registry:sequence\", \"registry:sequences\"], \"form\": \"chuỗi\", \"credited\": false}]", "candidate_target_forms": "chuỗi", "candidate_term_ids": "registry:sequence | registry:sequences", "ev08_role": "collision", "gold_target_span": "996:1001", "gold_label": "", "annotator_note": "REVIEW: đa 'chuỗi' block lớn; guess 'entire sequence'"}}, {"probe_type": "true_collision", "source_occ_id": "S0:d2l_introduction_index_b147:registry:machine learning:0", "source_term": "machine learning", "config": "S0", "source_text": "The problems that we have discussed so far, such as learning\nfrom the raw audio signal, \nthe raw pixel values of images,\nor mapping between sentences of arbitrary lengths and\ntheir counterparts in foreign languages,\nare those\nwhere deep learning excels and where traditional \nmachine learning\nmethods falter.\nIt turns out that these many-layered models\nare capable of addressing low-level perceptual data\nin a way that previous tools could not.\nArguably the most significant commonality in deep learning methods is the use of *end-to-end training*. \nThat is, rather than assembling a system based on components that are individually tuned, one builds the system and then tunes their performance jointly.\nFor instance, in computer vision scientists used to separate the process of *feature engineering* from the process of building machine learning models. The Canny edge detector :cite:`Canny.1987` and Lowe's SIFT feature extractor :cite:`Lowe.2004` reigned supreme for over a decade as algorithms for mapping images into feature vectors.\nIn bygone days, the crucial part of applying machine learning to these problems\nconsisted of coming up with manually-engineered ways\nof transforming the data into some form amenable to shallow models.\nUnfortunately, there is only so little that humans can accomplish by ingenuity in comparison with a consistent evaluation over millions of choices carried out automatically by an algorithm.\nWhen deep learning took over,\nthese feature extractors were replaced by automatically tuned filters, yielding superior accuracy.", "source_start": 276, "source_end": 292, "target_text": "Những vấn đề mà chúng ta đã thảo luận cho đến nay, như học từ tín hiệu âm thanh thô, các giá trị pixel thô của ảnh, hoặc ánh xạ giữa các câu có độ dài tùy ý và các câu tương ứng của chúng trong ngôn ngữ nước ngoài, là những vấn đề mà học sâu vượt trội và các phương pháp học máy truyền thống gặp khó khăn. Hóa ra những mô hình nhiều tầng này có khả năng xử lý dữ liệu tri giác mức thấp theo cách mà các công cụ trước đây không thể. Có lẽ điểm chung quan trọng nhất trong các phương pháp học sâu là việc sử dụng *huấn luyện đầu-cuối*. Tức là, thay vì ghép một hệ thống từ các thành phần được tinh chỉnh riêng lẻ, người ta xây dựng hệ thống rồi tinh chỉnh hiệu năng của chúng đồng thời. Chẳng hạn, trong thị giác máy tính, trước đây các nhà khoa học thường tách quá trình *thiết kế đặc trưng* khỏi quá trình xây dựng các mô hình học máy. Bộ phát hiện biên Canny :cite:`Canny.1987` và bộ trích xuất đặc trưng SIFT của Lowe :cite:`Lowe.2004` đã thống trị trong hơn một thập kỷ như các thuật toán ánh xạ ảnh thành các vector đặc trưng. Vào những ngày xưa, phần then chốt của việc áp dụng học máy cho các vấn đề này là nghĩ ra những cách biến đổi dữ liệu được thiết kế thủ công thành một dạng phù hợp với các mô hình nông. Đáng tiếc là, con người chỉ có thể làm được rất ít bằng sự sáng tạo so với việc một thuật toán tự động thực hiện đánh giá nhất quán trên hàng triệu lựa chọn. Khi học sâu lên ngôi, các bộ trích xuất đặc trưng này được thay thế bằng các bộ lọc được tinh chỉnh tự động, mang lại độ chính xác vượt trội.", "candidates": [{"start": 271, "end": 278, "surface": "học máy", "role": "collision", "term_ids": ["registry:learning", "registry:machine learning"], "form": "học máy", "credited": false}, {"start": 1083, "end": 1090, "surface": "học máy", "role": "collision", "term_ids": ["registry:learning", "registry:machine learning"], "form": "học máy", "credited": false}], "gold_label": "rendered", "gold_target_span": "271:278", "annotator_note": "[H]", "_row": {"probe_type": "true_collision", "block_id": "d2l_introduction_index_b147", "chapter": "d2l_introduction", "config": "S0", "source_term": "machine learning", "source_term_id": "registry:machine learning", "source_occ_id": "S0:d2l_introduction_index_b147:registry:machine learning:0", "source_span": "276:292:machine learning", "source_sentence": "The problems that we have discussed so far, such as learning\nfrom the raw audio signal, \nthe raw pixel values of images,\nor mapping between sentences of arbitrary lengths and\ntheir counterparts in foreign languages,\nare those\nwhere deep learning excels and where traditional \nmachine learning\nmethods falter.", "source_text": "The problems that we have discussed so far, such as learning\nfrom the raw audio signal, \nthe raw pixel values of images,\nor mapping between sentences of arbitrary lengths and\ntheir counterparts in foreign languages,\nare those\nwhere deep learning excels and where traditional \nmachine learning\nmethods falter.\nIt turns out that these many-layered models\nare capable of addressing low-level perceptual data\nin a way that previous tools could not.\nArguably the most significant commonality in deep learning methods is the use of *end-to-end training*. \nThat is, rather than assembling a system based on components that are individually tuned, one builds the system and then tunes their performance jointly.\nFor instance, in computer vision scientists used to separate the process of *feature engineering* from the process of building machine learning models. The Canny edge detector :cite:`Canny.1987` and Lowe's SIFT feature extractor :cite:`Lowe.2004` reigned supreme for over a decade as algorithms for mapping images into feature vectors.\nIn bygone days, the crucial part of applying machine learning to these problems\nconsisted of coming up with manually-engineered ways\nof transforming the data into some form amenable to shallow models.\nUnfortunately, there is only so little that humans can accomplish by ingenuity in comparison with a consistent evaluation over millions of choices carried out automatically by an algorithm.\nWhen deep learning took over,\nthese feature extractors were replaced by automatically tuned filters, yielding superior accuracy.", "target_text": "Những vấn đề mà chúng ta đã thảo luận cho đến nay, như học từ tín hiệu âm thanh thô, các giá trị pixel thô của ảnh, hoặc ánh xạ giữa các câu có độ dài tùy ý và các câu tương ứng của chúng trong ngôn ngữ nước ngoài, là những vấn đề mà học sâu vượt trội và các phương pháp học máy truyền thống gặp khó khăn. Hóa ra những mô hình nhiều tầng này có khả năng xử lý dữ liệu tri giác mức thấp theo cách mà các công cụ trước đây không thể. Có lẽ điểm chung quan trọng nhất trong các phương pháp học sâu là việc sử dụng *huấn luyện đầu-cuối*. Tức là, thay vì ghép một hệ thống từ các thành phần được tinh chỉnh riêng lẻ, người ta xây dựng hệ thống rồi tinh chỉnh hiệu năng của chúng đồng thời. Chẳng hạn, trong thị giác máy tính, trước đây các nhà khoa học thường tách quá trình *thiết kế đặc trưng* khỏi quá trình xây dựng các mô hình học máy. Bộ phát hiện biên Canny :cite:`Canny.1987` và bộ trích xuất đặc trưng SIFT của Lowe :cite:`Lowe.2004` đã thống trị trong hơn một thập kỷ như các thuật toán ánh xạ ảnh thành các vector đặc trưng. Vào những ngày xưa, phần then chốt của việc áp dụng học máy cho các vấn đề này là nghĩ ra những cách biến đổi dữ liệu được thiết kế thủ công thành một dạng phù hợp với các mô hình nông. Đáng tiếc là, con người chỉ có thể làm được rất ít bằng sự sáng tạo so với việc một thuật toán tự động thực hiện đánh giá nhất quán trên hàng triệu lựa chọn. Khi học sâu lên ngôi, các bộ trích xuất đặc trưng này được thay thế bằng các bộ lọc được tinh chỉnh tự động, mang lại độ chính xác vượt trội.", "block_is_multi_sentence": "true", "candidate_target_spans": "[{\"start\": 271, \"end\": 278, \"surface\": \"học máy\", \"role\": \"collision\", \"term_ids\": [\"registry:learning\", \"registry:machine learning\"], \"form\": \"học máy\", \"credited\": false}, {\"start\": 1083, \"end\": 1090, \"surface\": \"học máy\", \"role\": \"collision\", \"term_ids\": [\"registry:learning\", \"registry:machine learning\"], \"form\": \"học máy\", \"credited\": false}]", "candidate_target_forms": "học máy", "candidate_term_ids": "registry:learning | registry:machine learning", "ev08_role": "collision", "gold_target_span": "271:278", "gold_label": "rendered", "annotator_note": "[H]"}}, {"probe_type": "true_collision", "source_occ_id": "S1:d2l_introduction_index_b057:registry:image:0", "source_term": "image", "config": "S1", "source_text": "In *classification*, we want our model to look at features,\ne.g., the pixel values in an image,\nand then predict which *category* (formally called *class*),\namong some discrete set of options, an example belongs.\nFor handwritten digits, we might have ten classes,\ncorresponding to the digits 0 through 9.\nThe simplest form of classification is when there are only two classes,\na problem which we call *binary classification*.\nFor example, our dataset could consist of images of animals\nand our labels  might be the classes $\\mathrm{\\{cat, dog\\}}$.\nWhile in regression, we sought a regressor to output a numerical value,\nin classification, we seek a classifier, whose output is the predicted class assignment.", "source_start": 89, "source_end": 94, "target_text": "Trong *phân loại*, chúng ta muốn mô hình của mình nhìn vào các đặc trưng, ví dụ như các giá trị điểm ảnh trong một ảnh, rồi dự đoán hạng mục nào (về mặt chính thức gọi là *lớp*), trong một tập hợp các lựa chọn rời rạc, mà một mẫu thuộc về. Với chữ số viết tay, chúng ta có thể có mười lớp, tương ứng với các chữ số từ 0 đến 9. Dạng đơn giản nhất của phân loại là khi chỉ có hai lớp, một bài toán mà chúng ta gọi là *phân loại nhị phân*. Ví dụ, tập dữ liệu của chúng ta có thể gồm các ảnh động vật và nhãn của chúng ta có thể là các lớp $\\mathrm{\\{cat, dog\\}}$. Trong khi ở hồi quy, chúng ta tìm một bộ hồi quy để đầu ra một giá trị số, thì trong phân loại, chúng ta tìm một bộ phân loại, mà đầu ra của nó là gán lớp được dự đoán.", "candidates": [{"start": 115, "end": 118, "surface": "ảnh", "role": "collision", "term_ids": ["registry:image", "registry:images"], "form": "ảnh", "credited": false}, {"start": 484, "end": 487, "surface": "ảnh", "role": "collision", "term_ids": ["registry:image", "registry:images"], "form": "ảnh", "credited": false}], "gold_label": "rendered", "gold_target_span": "115:118", "annotator_note": "[H]", "_row": {"probe_type": "true_collision", "block_id": "d2l_introduction_index_b057", "chapter": "d2l_introduction", "config": "S1", "source_term": "image", "source_term_id": "registry:image", "source_occ_id": "S1:d2l_introduction_index_b057:registry:image:0", "source_span": "89:94:image", "source_sentence": "In *classification*, we want our model to look at features,\ne.g., the pixel values in an image,\nand then predict which *category* (formally called *class*),\namong some discrete set of options, an example belongs.", "source_text": "In *classification*, we want our model to look at features,\ne.g., the pixel values in an image,\nand then predict which *category* (formally called *class*),\namong some discrete set of options, an example belongs.\nFor handwritten digits, we might have ten classes,\ncorresponding to the digits 0 through 9.\nThe simplest form of classification is when there are only two classes,\na problem which we call *binary classification*.\nFor example, our dataset could consist of images of animals\nand our labels  might be the classes $\\mathrm{\\{cat, dog\\}}$.\nWhile in regression, we sought a regressor to output a numerical value,\nin classification, we seek a classifier, whose output is the predicted class assignment.", "target_text": "Trong *phân loại*, chúng ta muốn mô hình của mình nhìn vào các đặc trưng, ví dụ như các giá trị điểm ảnh trong một ảnh, rồi dự đoán hạng mục nào (về mặt chính thức gọi là *lớp*), trong một tập hợp các lựa chọn rời rạc, mà một mẫu thuộc về. Với chữ số viết tay, chúng ta có thể có mười lớp, tương ứng với các chữ số từ 0 đến 9. Dạng đơn giản nhất của phân loại là khi chỉ có hai lớp, một bài toán mà chúng ta gọi là *phân loại nhị phân*. Ví dụ, tập dữ liệu của chúng ta có thể gồm các ảnh động vật và nhãn của chúng ta có thể là các lớp $\\mathrm{\\{cat, dog\\}}$. Trong khi ở hồi quy, chúng ta tìm một bộ hồi quy để đầu ra một giá trị số, thì trong phân loại, chúng ta tìm một bộ phân loại, mà đầu ra của nó là gán lớp được dự đoán.", "block_is_multi_sentence": "true", "candidate_target_spans": "[{\"start\": 115, \"end\": 118, \"surface\": \"ảnh\", \"role\": \"collision\", \"term_ids\": [\"registry:image\", \"registry:images\"], \"form\": \"ảnh\", \"credited\": false}, {\"start\": 484, \"end\": 487, \"surface\": \"ảnh\", \"role\": \"collision\", \"term_ids\": [\"registry:image\", \"registry:images\"], \"form\": \"ảnh\", \"credited\": false}]", "candidate_target_forms": "ảnh", "candidate_term_ids": "registry:image | registry:images", "ev08_role": "collision", "gold_target_span": "115:118", "gold_label": "rendered", "annotator_note": "[H]"}}, {"probe_type": "true_collision", "source_occ_id": "S1:d2l_introduction_index_b058:registry:probability:0", "source_term": "probability", "config": "S1", "source_text": "For reasons that we will get into as the book gets more technical,\nit can be hard to optimize a model that can only output\na hard categorical assignment, \ne.g., either \"cat\" or \"dog\".\nIn these cases, it is usually much easier to instead express\nour model in the language of probabilities.\nGiven features of an example, \nour model assigns a probability\nto each possible class. \nReturning to our animal classification example\nwhere the classes are $\\mathrm{\\{cat, dog\\}}$,\na classifier might see an image and output the probability\nthat the image is a cat as 0.9.\nWe can interpret this number by saying that the classifier\nis 90\\% sure that the image depicts a cat.\nThe magnitude of the probability for the predicted class\nconveys one notion of uncertainty.\nIt is not the only notion of uncertainty\nand we will discuss others in more advanced chapters.", "source_start": 340, "source_end": 351, "target_text": "Vì những lý do mà chúng ta sẽ đi sâu vào khi cuốn sách trở nên kỹ thuật hơn, có thể khó tối ưu hóa một mô hình chỉ có thể đầu ra một gán hạng mục cứng, ví dụ, hoặc là \"cat\" hoặc là \"dog\". Trong những trường hợp này, thường dễ hơn nhiều nếu thay vào đó biểu diễn mô hình của chúng ta bằng ngôn ngữ của xác suất. Với các đặc trưng của một mẫu, mô hình của chúng ta gán một xác suất cho mỗi lớp có thể có. Quay lại ví dụ phân loại động vật của chúng ta, trong đó các lớp là $\\mathrm{\\{cat, dog\\}}$, một bộ phân loại có thể nhìn thấy một ảnh và đầu ra xác suất rằng ảnh đó là một con mèo là 0.9. Chúng ta có thể diễn giải con số này bằng cách nói rằng bộ phân loại chắc chắn 90\\% rằng ảnh mô tả một con mèo. Độ lớn của xác suất cho lớp được dự đoán truyền đạt một khái niệm về độ bất định. Nó không phải là khái niệm duy nhất về độ bất định và chúng ta sẽ thảo luận các khái niệm khác trong các chương nâng cao hơn.", "candidates": [{"start": 301, "end": 309, "surface": "xác suất", "role": "collision", "term_ids": ["registry:probabilities", "registry:probability"], "form": "xác suất", "credited": false}, {"start": 371, "end": 379, "surface": "xác suất", "role": "collision", "term_ids": ["registry:probabilities", "registry:probability"], "form": "xác suất", "credited": false}, {"start": 548, "end": 556, "surface": "xác suất", "role": "collision", "term_ids": ["registry:probabilities", "registry:probability"], "form": "xác suất", "credited": false}, {"start": 715, "end": 723, "surface": "xác suất", "role": "collision", "term_ids": ["registry:probabilities", "registry:probability"], "form": "xác suất", "credited": false}], "gold_label": "rendered", "gold_target_span": "371:379", "annotator_note": "[M]", "_row": {"probe_type": "true_collision", "block_id": "d2l_introduction_index_b058", "chapter": "d2l_introduction", "config": "S1", "source_term": "probability", "source_term_id": "registry:probability", "source_occ_id": "S1:d2l_introduction_index_b058:registry:probability:0", "source_span": "340:351:probability", "source_sentence": "Given features of an example, \nour model assigns a probability\nto each possible class.", "source_text": "For reasons that we will get into as the book gets more technical,\nit can be hard to optimize a model that can only output\na hard categorical assignment, \ne.g., either \"cat\" or \"dog\".\nIn these cases, it is usually much easier to instead express\nour model in the language of probabilities.\nGiven features of an example, \nour model assigns a probability\nto each possible class. \nReturning to our animal classification example\nwhere the classes are $\\mathrm{\\{cat, dog\\}}$,\na classifier might see an image and output the probability\nthat the image is a cat as 0.9.\nWe can interpret this number by saying that the classifier\nis 90\\% sure that the image depicts a cat.\nThe magnitude of the probability for the predicted class\nconveys one notion of uncertainty.\nIt is not the only notion of uncertainty\nand we will discuss others in more advanced chapters.", "target_text": "Vì những lý do mà chúng ta sẽ đi sâu vào khi cuốn sách trở nên kỹ thuật hơn, có thể khó tối ưu hóa một mô hình chỉ có thể đầu ra một gán hạng mục cứng, ví dụ, hoặc là \"cat\" hoặc là \"dog\". Trong những trường hợp này, thường dễ hơn nhiều nếu thay vào đó biểu diễn mô hình của chúng ta bằng ngôn ngữ của xác suất. Với các đặc trưng của một mẫu, mô hình của chúng ta gán một xác suất cho mỗi lớp có thể có. Quay lại ví dụ phân loại động vật của chúng ta, trong đó các lớp là $\\mathrm{\\{cat, dog\\}}$, một bộ phân loại có thể nhìn thấy một ảnh và đầu ra xác suất rằng ảnh đó là một con mèo là 0.9. Chúng ta có thể diễn giải con số này bằng cách nói rằng bộ phân loại chắc chắn 90\\% rằng ảnh mô tả một con mèo. Độ lớn của xác suất cho lớp được dự đoán truyền đạt một khái niệm về độ bất định. Nó không phải là khái niệm duy nhất về độ bất định và chúng ta sẽ thảo luận các khái niệm khác trong các chương nâng cao hơn.", "block_is_multi_sentence": "true", "candidate_target_spans": "[{\"start\": 301, \"end\": 309, \"surface\": \"xác suất\", \"role\": \"collision\", \"term_ids\": [\"registry:probabilities\", \"registry:probability\"], \"form\": \"xác suất\", \"credited\": false}, {\"start\": 371, \"end\": 379, \"surface\": \"xác suất\", \"role\": \"collision\", \"term_ids\": [\"registry:probabilities\", \"registry:probability\"], \"form\": \"xác suất\", \"credited\": false}, {\"start\": 548, \"end\": 556, \"surface\": \"xác suất\", \"role\": \"collision\", \"term_ids\": [\"registry:probabilities\", \"registry:probability\"], \"form\": \"xác suất\", \"credited\": false}, {\"start\": 715, \"end\": 723, \"surface\": \"xác suất\", \"role\": \"collision\", \"term_ids\": [\"registry:probabilities\", \"registry:probability\"], \"form\": \"xác suất\", \"credited\": false}]", "candidate_target_forms": "xác suất", "candidate_term_ids": "registry:probabilities | registry:probability", "ev08_role": "collision", "gold_target_span": "371:379", "gold_label": "rendered", "annotator_note": "[M]"}}, {"probe_type": "true_collision", "source_occ_id": "S1:d2l_introduction_index_b134:registry:minibatch:0", "source_term": "minibatch", "config": "S1", "source_text": "* Novel methods for capacity control, such as *dropout*\n  :cite:`Srivastava.Hinton.Krizhevsky.ea.2014`,\n  have helped to mitigate the danger of overfitting.\n  This was achieved by applying noise injection :cite:`Bishop.1995`\n  throughout the neural network, replacing weights by random variables\n  for training purposes.\n* Attention mechanisms solved a second problem\n  that had plagued statistics for over a century:\n  how to increase the memory and complexity of a system without\n  increasing the number of learnable parameters.\n  Researchers found an elegant solution\n  by using what can only be viewed as a learnable pointer structure :cite:`Bahdanau.Cho.Bengio.2014`.\n  Rather than having to remember an entire text sequence, e.g.,\n  for machine translation in a fixed-dimensional representation,\n  all that needed to be stored was a pointer to the intermediate state\n  of the translation process. This allowed for significantly\n  increased accuracy for long sequences, since the model\n  no longer needed to remember the entire sequence before\n  commencing the generation of a new sequence.\n* Multi-stage designs, e.g., via the memory networks \n  :cite:`Sukhbaatar.Weston.Fergus.ea.2015` and the neural programmer-interpreter :cite:`Reed.De-Freitas.2015`\n  allowed statistical modelers to describe iterative approaches to reasoning. These tools allow for an internal state of the deep neural network\n  to be modified repeatedly, thus carrying out subsequent steps\n  in a chain of reasoning, similar to how a processor\n  can modify memory for a computation.\n* Another key development was the invention of generative adversarial networks\n  :cite:`Goodfellow.Pouget-Abadie.Mirza.ea.2014`.\n  Traditionally, statistical methods for density estimation\n  and generative models focused on finding proper probability distributions\n  and (often approximate) algorithms for sampling from them.\n  As a result, these algorithms were largely limited by the lack of\n  flexibility inherent in the statistical models.\n  The crucial innovation in generative adversarial networks was to replace the sampler\n  by an arbitrary algorithm with differentiable parameters.\n  These are then adjusted in such a way that the discriminator\n  (effectively a two-sample test) cannot distinguish fake from real data.\n  Through the ability to use arbitrary algorithms to generate data,\n  it opened up density estimation to a wide variety of techniques.\n  Examples of galloping Zebras :cite:`Zhu.Park.Isola.ea.2017`\n  and of fake celebrity faces :cite:`Karras.Aila.Laine.ea.2017`\n  are both testimony to this progress.\n  Even amateur doodlers can produce\n  photorealistic images based on just sketches that describe\n  how the layout of a scene looks like :cite:`Park.Liu.Wang.ea.2019`.\n* In many cases, a single GPU is insufficient to process\n  the large amounts of data available for training.\n  Over the past decade the ability to build parallel and\n  distributed training algorithms has improved significantly.\n  One of the key challenges in designing scalable algorithms\n  is that the workhorse of deep learning optimization,\n  stochastic gradient descent, relies on relatively\n  small minibatches of data to be processed.\n  At the same time, small batches limit the efficiency of GPUs.\n  Hence, training on 1024 GPUs with a minibatch size of,\n  say 32 images per batch amounts to an aggregate minibatch\n  of about 32000 images. Recent work, first by Li :cite:`Li.2017`,\n  and subsequently by :cite:`You.Gitman.Ginsburg.2017`\n  and :cite:`Jia.Song.He.ea.2018` pushed the size up to 64000 observations,\n  reducing training time for the ResNet-50 model on the ImageNet dataset to less than 7 minutes.\n  For comparison---initially training times were measured in the order of days.\n* The ability to parallelize computation has also contributed quite crucially\n  to progress in reinforcement learning, at least whenever simulation is an\n  option. This has led to significant progress in computers achieving\n  superhuman performance in Go, Atari games, Starcraft, and in physics\n  simulations (e.g., using MuJoCo). See e.g.,\n  :cite:`Silver.Huang.Maddison.ea.2016` for a description\n  of how to achieve this in AlphaGo. In a nutshell,\n  reinforcement learning works best if plenty of (state, action, reward) triples are available, i.e., whenever it is possible to try out lots of things to learn how they relate to each\n  other. Simulation provides such an avenue.\n* Deep learning frameworks have played a crucial role\n  in disseminating ideas. The first generation of frameworks\n  allowing for easy modeling encompassed\n  [Caffe](https://github.com/BVLC/caffe),\n  [Torch](https://github.com/torch), and\n  [Theano](https://github.com/Theano/Theano).\n  Many seminal papers were written using these tools.\n  By now, they have been superseded by\n  [TensorFlow](https://github.com/tensorflow/tensorflow) (often used via its high level API [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), and [Apache MXNet](https://github.com/apache/incubator-mxnet). The third generation of tools, namely imperative tools for deep learning,\n  was arguably spearheaded by [Chainer](https://github.com/chainer/chainer),\n  which used a syntax similar to Python NumPy to describe models.\n  This idea was adopted by both [PyTorch](https://github.com/pytorch/pytorch),\n  the [Gluon API](https://github.com/apache/incubator-mxnet) of MXNet, and [Jax](https://github.com/google/jax).", "source_start": 3300, "source_end": 3309, "target_text": "* Các phương pháp mới để điều khiển năng lực, chẳng hạn như *dropout*   :cite:`Srivastava.Hinton.Krizhevsky.ea.2014`,   đã giúp giảm thiểu nguy cơ quá khớp.   Điều này đạt được bằng cách áp dụng tiêm nhiễu :cite:`Bishop.1995`   xuyên suốt mạng nơ-ron, thay thế trọng số bằng các biến ngẫu nhiên   cho mục đích huấn luyện. * Các cơ chế chú ý đã giải quyết một vấn đề thứ hai   đã làm khổ thống kê trong hơn một thế kỷ:   làm thế nào để tăng bộ nhớ và độ phức tạp của một hệ thống mà không   làm tăng số lượng tham số học được.   Các nhà nghiên cứu đã tìm ra một giải pháp thanh lịch   bằng cách sử dụng cái chỉ có thể được xem như một cấu trúc con trỏ có thể học được :cite:`Bahdanau.Cho.Bengio.2014`.   Thay vì phải ghi nhớ toàn bộ một chuỗi văn bản, ví dụ,   cho dịch máy trong một biểu diễn có số chiều cố định,   tất cả những gì cần lưu trữ chỉ là một con trỏ tới trạng thái trung gian   của quá trình dịch. Điều này cho phép tăng đáng kể độ chính xác   đối với các chuỗi dài, vì mô hình   không còn cần phải ghi nhớ toàn bộ chuỗi trước khi   bắt đầu tạo ra một chuỗi mới. * Các thiết kế nhiều giai đoạn, ví dụ, thông qua memory networks    :cite:`Sukhbaatar.Weston.Fergus.ea.2015` và neural programmer-interpreter :cite:`Reed.De-Freitas.2015`   đã cho phép các nhà mô hình hóa thống kê mô tả các cách tiếp cận suy luận lặp đi lặp lại. Các công cụ này cho phép trạng thái bên trong của mạng nơ-ron sâu   được sửa đổi nhiều lần, qua đó thực hiện các bước tiếp theo   trong một chuỗi suy luận, tương tự như cách một bộ xử lý   có thể sửa đổi bộ nhớ cho một tính toán. * Một phát triển then chốt khác là sự ra đời của mạng đối nghịch sinh   :cite:`Goodfellow.Pouget-Abadie.Mirza.ea.2014`.   Theo truyền thống, các phương pháp thống kê cho ước lượng mật độ   và mô hình sinh tập trung vào việc tìm các phân phối xác suất phù hợp   và các thuật toán (thường là xấp xỉ) để lấy mẫu từ chúng.   Kết quả là, các thuật toán này phần lớn bị giới hạn bởi sự thiếu   linh hoạt vốn có trong các mô hình thống kê.   Đổi mới then chốt trong mạng đối nghịch sinh là thay bộ lấy mẫu   bằng một thuật toán tùy ý với các tham số khả vi.   Sau đó, các tham số này được điều chỉnh sao cho bộ phân biệt   (về thực chất là một kiểm định hai mẫu) không thể phân biệt dữ liệu giả với dữ liệu thật.   Thông qua khả năng sử dụng các thuật toán tùy ý để tạo dữ liệu,   nó đã mở rộng ước lượng mật độ sang một loạt kỹ thuật rất đa dạng.   Các ví dụ về ngựa vằn phi nước đại :cite:`Zhu.Park.Isola.ea.2017`   và về khuôn mặt người nổi tiếng giả :cite:`Karras.Aila.Laine.ea.2017`   đều là minh chứng cho tiến bộ này.   Ngay cả những người vẽ nguệch ngoạc nghiệp dư cũng có thể tạo ra   ảnh chân thực dựa chỉ trên các bản phác thảo mô tả   bố cục của một cảnh trông như thế nào :cite:`Park.Liu.Wang.ea.2019`. * Trong nhiều trường hợp, một GPU đơn lẻ là không đủ để xử lý   lượng dữ liệu lớn sẵn có cho huấn luyện.   Trong thập kỷ qua, khả năng xây dựng các thuật toán huấn luyện song song và   phân tán đã được cải thiện đáng kể.   Một trong những thách thức chính khi thiết kế các thuật toán có khả năng mở rộng   là công cụ chủ lực của tối ưu hóa học sâu,   hạ gradient ngẫu nhiên, phụ thuộc vào các mini lô dữ liệu tương đối   nhỏ để được xử lý.   Đồng thời, các lô nhỏ làm hạn chế hiệu quả của GPU.   Vì vậy, huấn luyện trên 1024 GPU với kích thước minibatch,   chẳng hạn 32 ảnh mỗi lô, tương đương với một minibatch tổng hợp   khoảng 32000 ảnh. Các công trình gần đây, đầu tiên bởi Li :cite:`Li.2017`,   và sau đó bởi :cite:`You.Gitman.Ginsburg.2017`   và :cite:`Jia.Song.He.ea.2018` đã nâng kích thước lên 64000 quan sát,   giảm thời gian huấn luyện cho mô hình ResNet-50 trên tập dữ liệu ImageNet xuống dưới 7 phút.   Để so sánh---ban đầu thời gian huấn luyện được đo theo đơn vị ngày. * Khả năng song song hóa tính toán cũng đã đóng góp cực kỳ quan trọng   vào tiến bộ trong học tăng cường, ít nhất là bất cứ khi nào mô phỏng là một   lựa chọn. Điều này đã dẫn đến tiến bộ đáng kể trong việc máy tính đạt được   hiệu năng vượt con người trong Go, các trò chơi Atari, Starcraft, và trong các   mô phỏng vật lý (ví dụ, sử dụng MuJoCo). Xem ví dụ,   :cite:`Silver.Huang.Maddison.ea.2016` để biết mô tả   về cách đạt được điều này trong AlphaGo. Nói ngắn gọn,   học tăng cường hoạt động tốt nhất nếu có sẵn nhiều bộ ba (trạng thái, hành động, phần thưởng), tức là, bất cứ khi nào có thể thử nhiều thứ để học cách chúng liên hệ với nhau. Mô phỏng cung cấp một con đường như vậy. * Các khung học sâu đã đóng vai trò then chốt   trong việc phổ biến các ý tưởng. Thế hệ đầu tiên của các khung cho phép mô hình hóa dễ dàng bao gồm   [Caffe](https://github.com/BVLC/caffe),   [Torch](https://github.com/torch), và   [Theano](https://github.com/Theano/Theano).   Nhiều bài báo nền tảng đã được viết bằng các công cụ này.   Đến nay, chúng đã được thay thế bởi   [TensorFlow](https://github.com/tensorflow/tensorflow) (thường được dùng thông qua API cấp cao [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), và [Apache MXNet](https://github.com/apache/incubator-mxnet). Thế hệ công cụ thứ ba, cụ thể là các công cụ mệnh lệnh cho học sâu,   có thể nói đã được tiên phong bởi [Chainer](https://github.com/chainer/chainer),   vốn dùng cú pháp tương tự Python NumPy để mô tả các mô hình.   Ý tưởng này đã được cả [PyTorch](https://github.com/pytorch/pytorch),   [Gluon API](https://github.com/apache/incubator-mxnet) của MXNet, và [Jax](https://github.com/google/jax) tiếp nhận.", "candidates": [{"start": 3235, "end": 3241, "surface": "lô nhỏ", "role": "collision", "term_ids": ["registry:minibatch", "registry:minibatches"], "form": "lô nhỏ", "credited": false}, {"start": 3380, "end": 3389, "surface": "minibatch", "role": "collision", "term_ids": ["registry:minibatch", "registry:minibatches"], "form": "minibatch", "credited": false}], "gold_label": "", "gold_target_span": "3380:3389", "annotator_note": "REVIEW: 'kích thước minibatch' không phải candidate; 3380 là 'aggregate'", "_row": {"probe_type": "true_collision", "block_id": "d2l_introduction_index_b134", "chapter": "d2l_introduction", "config": "S1", "source_term": "minibatch", "source_term_id": "registry:minibatch", "source_occ_id": "S1:d2l_introduction_index_b134:registry:minibatch:0", "source_span": "3300:3309:minibatch", "source_sentence": "Hence, training on 1024 GPUs with a minibatch size of,\n  say 32 images per batch amounts to an aggregate minibatch\n  of about 32000 images.", "source_text": "* Novel methods for capacity control, such as *dropout*\n  :cite:`Srivastava.Hinton.Krizhevsky.ea.2014`,\n  have helped to mitigate the danger of overfitting.\n  This was achieved by applying noise injection :cite:`Bishop.1995`\n  throughout the neural network, replacing weights by random variables\n  for training purposes.\n* Attention mechanisms solved a second problem\n  that had plagued statistics for over a century:\n  how to increase the memory and complexity of a system without\n  increasing the number of learnable parameters.\n  Researchers found an elegant solution\n  by using what can only be viewed as a learnable pointer structure :cite:`Bahdanau.Cho.Bengio.2014`.\n  Rather than having to remember an entire text sequence, e.g.,\n  for machine translation in a fixed-dimensional representation,\n  all that needed to be stored was a pointer to the intermediate state\n  of the translation process. This allowed for significantly\n  increased accuracy for long sequences, since the model\n  no longer needed to remember the entire sequence before\n  commencing the generation of a new sequence.\n* Multi-stage designs, e.g., via the memory networks \n  :cite:`Sukhbaatar.Weston.Fergus.ea.2015` and the neural programmer-interpreter :cite:`Reed.De-Freitas.2015`\n  allowed statistical modelers to describe iterative approaches to reasoning. These tools allow for an internal state of the deep neural network\n  to be modified repeatedly, thus carrying out subsequent steps\n  in a chain of reasoning, similar to how a processor\n  can modify memory for a computation.\n* Another key development was the invention of generative adversarial networks\n  :cite:`Goodfellow.Pouget-Abadie.Mirza.ea.2014`.\n  Traditionally, statistical methods for density estimation\n  and generative models focused on finding proper probability distributions\n  and (often approximate) algorithms for sampling from them.\n  As a result, these algorithms were largely limited by the lack of\n  flexibility inherent in the statistical models.\n  The crucial innovation in generative adversarial networks was to replace the sampler\n  by an arbitrary algorithm with differentiable parameters.\n  These are then adjusted in such a way that the discriminator\n  (effectively a two-sample test) cannot distinguish fake from real data.\n  Through the ability to use arbitrary algorithms to generate data,\n e to try out lots of things to learn how they relate to each\n  other. Simulation provides such an avenue.\n* Deep learning frameworks have played a crucial role\n  in disseminating ideas. The first generation of frameworks\n  allowing for easy modeling encompassed\n  [Caffe](https://github.com/BVLC/caffe),\n  [Torch](https://github.com/torch), and\n  [Theano](https://github.com/Theano/Theano).\n  Many seminal papers were written using these tools.\n  By now, they have been superseded by\n  [TensorFlow](https://github.com/tensorflow/tensorflow) (often used via its high level API [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), and [Apache MXNet](https://github.com/apache/incubator-mxnet). The third generation of tools, namely imperative tools for deep learning,\n  was arguably spearheaded by [Chainer](https://github.com/chainer/chainer),\n  which used a syntax similar to Python NumPy to describe models.\n  This idea was adopted by both [PyTorch](https://github.com/pytorch/pytorch),\n  the [Gluon API](https://github.com/apache/incubator-mxnet) of MXNet, and [Jax](https://github.com/google/jax).", "target_text": "* Các phương pháp mới để điều khiển năng lực, chẳng hạn như *dropout*   :cite:`Srivastava.Hinton.Krizhevsky.ea.2014`,   đã giúp giảm thiểu nguy cơ quá khớp.   Điều này đạt được bằng cách áp dụng tiêm nhiễu :cite:`Bishop.1995`   xuyên suốt mạng nơ-ron, thay thế trọng số bằng các biến ngẫu nhiên   cho mục đích huấn luyện. * Các cơ chế chú ý đã giải quyết một vấn đề thứ hai   đã làm khổ thống kê trong hơn một thế kỷ:   làm thế nào để tăng bộ nhớ và độ phức tạp của một hệ thống mà không   làm tăng số lượng tham số học được.   Các nhà nghiên cứu đã tìm ra một giải pháp thanh lịch   bằng cách sử dụng cái chỉ có thể được xem như một cấu trúc con trỏ có thể học được :cite:`Bahdanau.Cho.Bengio.2014`.   Thay vì phải ghi nhớ toàn bộ một chuỗi văn bản, ví dụ,   cho dịch máy trong một bi  nhiều trường hợp, một GPU đơn lẻ là không đủ để xử lý   lượng dữ liệu lớn sẵn có cho huấn luyện.   Trong thập kỷ qua, khả năng xây dựng các thuật toán huấn luyện song song và   phân tán đã được cải thiện đáng kể.   Một trong những thách thức chính khi thiết kế các thuật toán có khả năng mở rộng   là công cụ chủ lực của tối ưu hóa học sâu,   hạ gradient ngẫu nhiên, phụ thuộc vào các mini lô dữ liệu tương đối   nhỏ để được xử lý.   Đồng thời, các lô nhỏ làm hạn chế hiệu quả của GPU.   Vì vậy, huấn luyện trên 1024 GPU với kích thước minibatch,   chẳng hạn 32 ảnh mỗi lô, tương đương với một minibatch tổng hợp   khoảng 32000 ảnh. Các công trình gần đây, đầu tiên bởi Li :cite:`Li.2017`,   và sau đó bởi :cite:`You.Gitman.Ginsburg.2017`   và :cite:`Jia.Song.He.ea.2018` đã nâng kích thước lên 64000 quan sát,   giảm thời gian huấn luyện cho mô hình ResNet-50 trên tập dữ liệu ImageNet xuống dưới 7 phút.   Để so sánh---ban đầu thời gian huấn luyện được đo theo đơn vị ngày. * Khả năng song song hóa tính toán cũng đã đóng góp cực kỳ quan trọng   vào tiến bộ trong học tăng cường, ít nhất là bất cứ khi nào mô phỏng là một   lựa chọn. Điều này đã dẫn đến tiến bộ đáng kể trong việc máy tính đạt được   hiệu năng vượt con người trong Go, các trò chơi Atari, Starcraft, và trong các   mô phỏng vật lý (ví dụ, sử dụng MuJoCo). Xem ví dụ,   :cite:`Silver.Huang.Maddison.ea.2016` để biết mô tả   về cách đạt được điều này trong AlphaGo. Nói ngắn gọn,   học tăng cường hoạt động tốt nhất nếu có sẵn nhiều bộ ba (trạng thái, hành động, phần thưởng), tức là, bất cứ khi nào có thể thử nhiều thứ để học cách chúng liên hệ với nhau. Mô phỏng cung cấp một con đường như vậy. * Các khung học sâu đã đóng vai trò then chốt   trong việc phổ biến các ý tưởng. Thế hệ đầu tiên của các khung cho phép mô hình hóa dễ dàng bao gồm   [Caffe](https://github.com/BVLC/caffe),   [Torch](https://github.com/torch), và   [Theano](https://github.com/Theano/Theano).   Nhiều bài báo nền tảng đã được viết bằng các công cụ này.   Đến nay, chúng đã được thay thế bởi   [TensorFlow](https://github.com/tensorflow/tensorflow) (thường được dùng thông qua API cấp cao [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), và [Apache MXNet](https://github.com/apache/incubator-mxnet). Thế hệ công cụ thứ ba, cụ thể là các công cụ mệnh lệnh cho học sâu,   có thể nói đã được tiên phong bởi [Chainer](https://github.com/chainer/chainer),   vốn dùng cú pháp tương tự Python NumPy để mô tả các mô hình.   Ý tưởng này đã được cả [PyTorch](https://github.com/pytorch/pytorch),   [Gluon API](https://github.com/apache/incubator-mxnet) của MXNet, và [Jax](https://github.com/google/jax) tiếp nhận.", "block_is_multi_sentence": "true", "candidate_target_spans": "[{\"start\": 3235, \"end\": 3241, \"surface\": \"lô nhỏ\", \"role\": \"collision\", \"term_ids\": [\"registry:minibatch\", \"registry:minibatches\"], \"form\": \"lô nhỏ\", \"credited\": false}, {\"start\": 3380, \"end\": 3389, \"surface\": \"minibatch\", \"role\": \"collision\", \"term_ids\": [\"registry:minibatch\", \"registry:minibatches\"], \"form\": \"minibatch\", \"credited\": false}]", "candidate_target_forms": "lô nhỏ | minibatch", "candidate_term_ids": "registry:minibatch | registry:minibatches", "ev08_role": "collision", "gold_target_span": "3380:3389", "gold_label": "", "annotator_note": "REVIEW: 'kích thước minibatch' không phải candidate; 3380 là 'aggregate'"}}, {"probe_type": "true_collision", "source_occ_id": "S1:d2l_introduction_index_b147:registry:algorithms:0", "source_term": "algorithms", "config": "S1", "source_text": "The problems that we have discussed so far, such as learning\nfrom the raw audio signal, \nthe raw pixel values of images,\nor mapping between sentences of arbitrary lengths and\ntheir counterparts in foreign languages,\nare those\nwhere deep learning excels and where traditional \nmachine learning\nmethods falter.\nIt turns out that these many-layered models\nare capable of addressing low-level perceptual data\nin a way that previous tools could not.\nArguably the most significant commonality in deep learning methods is the use of *end-to-end training*. \nThat is, rather than assembling a system based on components that are individually tuned, one builds the system and then tunes their performance jointly.\nFor instance, in computer vision scientists used to separate the process of *feature engineering* from the process of building machine learning models. The Canny edge detector :cite:`Canny.1987` and Lowe's SIFT feature extractor :cite:`Lowe.2004` reigned supreme for over a decade as algorithms for mapping images into feature vectors.\nIn bygone days, the crucial part of applying machine learning to these problems\nconsisted of coming up with manually-engineered ways\nof transforming the data into some form amenable to shallow models.\nUnfortunately, there is only so little that humans can accomplish by ingenuity in comparison with a consistent evaluation over millions of choices carried out automatically by an algorithm.\nWhen deep learning took over,\nthese feature extractors were replaced by automatically tuned filters, yielding superior accuracy.", "source_start": 988, "source_end": 998, "target_text": "Những bài toán mà chúng ta đã thảo luận cho đến nay, chẳng hạn như học từ tín hiệu âm thanh thô, các giá trị điểm ảnh thô của ảnh, hoặc ánh xạ giữa các câu có độ dài tùy ý và các câu tương ứng của chúng trong các ngôn ngữ nước ngoài, là những bài toán mà học sâu vượt trội và các phương pháp học máy truyền thống thì gặp khó khăn. Hóa ra những mô hình nhiều tầng này có khả năng xử lý dữ liệu tri giác mức thấp theo cách mà các công cụ trước đây không thể. Có lẽ điểm chung quan trọng nhất trong các phương pháp học sâu là việc sử dụng *huấn luyện đầu cuối*. Tức là, thay vì lắp ráp một hệ thống dựa trên các thành phần được tinh chỉnh riêng lẻ, người ta xây dựng hệ thống rồi tinh chỉnh hiệu năng của chúng m t_text": "Nhiều lần triển khai học máy thất bại có thể truy nguyên về khuôn mẫu này. Đôi khi các mô hình dường như hoạt động tuyệt vời khi được đo bằng độ chính xác tập kiểm tra nhưng lại thất bại thảm hại khi triển khai khi phân phối của dữ liệu đột ngột dịch chuyển. Tinh vi hơn, đôi khi chính việc triển khai một mô hình có thể là chất xúc tác làm xáo trộn phân phối dữ liệu. Ví dụ, giả sử rằng chúng ta đã huấn luyện một mô hình để dự đoán ai sẽ trả nợ so với vỡ nợ trên một khoản vay, và phát hiện rằng lựa chọn giày dép của một người nộp đơn có liên quan đến rủi ro vỡ nợ (giày Oxford cho thấy sẽ trả nợ, giày thể thao cho thấy sẽ vỡ nợ). Khi đó, chúng ta có thể có xu hướng sau đó cấp khoản vay cho tất cả người nộp đơn đi giày Oxford và từ chối tất cả người nộp đơn đi giày thể thao.", "candidates": [{"start": 306, "end": 313, "surface": "mô hình", "role": "collision", "term_ids": ["registry:model", "registry:models"], "form": "mô hình", "credited": false}, {"start": 415, "end": 422, "surface": "mô hình", "role": "collision", "term_ids": ["registry:model", "registry:models"], "form": "mô hình", "credited": false}], "gold_label": "rendered", "gold_target_span": "306:313", "annotator_note": "[H]", "_row": {"probe_type": "true_collision", "block_id": "d2l_multilayer_perceptrons_environment_b003", "chapter": "d2l_multilayer_perceptrons", "config": "S1", "source_term": "model", "source_term_id": "registry:model", "source_occ_id": "S1:d2l_multilayer_perceptrons_environment_b003:registry:model:0", "source_span": "297:302:model", "source_sentence": "More insidiously, sometimes the very deployment of a model\ncan be the catalyst that perturbs the data distribution.", "source_text": "Many failed machine learning deployments\ncan be traced back to this pattern.\nSometimes models appear to perform marvelously\nas measured by test set accuracy\nbut fail catastrophically in deployment\nwhen the distribution of data suddenly shifts.\nMore insidiously, sometimes the very deployment of
