l{A}_2, \\ldots$ mà *loại trừ lẫn nhau* ($\\mathcal{A}_i \\cap \\mathcal{A}_j = \\emptyset$ với mọi $i \\neq j$), xác suất để bất kỳ biến cố nào xảy ra bằng tổng các xác suất riêng lẻ của chúng, tức là $P(\\bigcup_{i=1}^{\\infty} \\mathcal{A}_i) = \\sum_{i=1}^{\\infty} P(\\mathcal{A}_i)$.", "block_is_multi_sentence": "false", "candidate_target_spans": "[{\"start\": 33, \"end\": 41, \"surface\": \"xác suất\", \"role\": \"collision\", \"term_ids\": [\"registry:probabilities\", \"registry:probability\"], \"form\": \"xác suất\", \"credited\": false}, {\"start\": 101, \"end\": 109, \"surface\": \"Xác suất\", \"role\": \"collision\", \"term_ids\": [\"registry:probabilities\", \"registry:probability\"], \"form\": \"xác suất\", \"credited\": false}, {\"start\": 342, \"end\": 350, \"surface\": \"xác suất\", \"role\": \"collision\", \"term_ids\": [\"registry:probabilities\", \"registry:probability\"], \"form\": \"xác suất\", \"credited\": false}, {\"start\": 394, \"end\": 402, \"surface\": \"xác suất\", \"role\": \"collision\", \"term_ids\": [\"registry:probabilities\", \"registry:probability\"], \"form\": \"xác suất\", \"credited\": false}]", "candidate_target_forms": "xác suất", "candidate_term_ids": "registry:probabilities | registry:probability", "ev08_role": "collision", "gold_target_span": "33:41", "gold_label": "rendered", "annotator_note": "[H]"}}, {"probe_type": "true_collision", "source_occ_id": "S1:d2l_preliminaries_probability_b069:registry:distribution:0", "source_term": "distribution", "config": "S1", "source_text": "$$\\begin{aligned}\n&P(H = 1 \\mid D_1 = 1, D_2 = 1)\\\\\n=& \\frac{P(D_1 = 1, D_2 = 1 \\mid H=1) P(H=1)}{P(D_1 = 1, D_2 = 1)} \\\\\n=& 0.8307.\n\\end{aligned}\n$$\n\nThat is, the second test allowed us to gain much higher confidence that not all is well. Despite the second test being considerably less accurate than the first one, it still significantly improved our estimate.\n\n\n\n## Expectation and Variance\n\nTo summarize key characteristics of probability distributions,\nwe need some measures.\nThe *expectation* (or average) of the random variable $X$ is denoted as\n\n$$E[X] = \\sum_{x} x P(X = x).$$\n\nWhen the input of a function $f(x)$ is a random variable drawn from the distribution $P$ with different values $x$,\nthe expectation of $f(x)$ is computed as\n\n$$E_{x \\sim P}[f(x)] = \\sum_x f(x) P(x).$$\n\n\nIn many cases we want to measure by how much the random variable $X$ deviates from its expectation. This can be quantified by the variance\n\n$$\\mathrm{Var}[X] = E\\left[(X - E[X])^2\\right] =\nE[X^2] - E[X]^2.$$\n\nIts square root is called the *standard deviation*.\nThe variance of a function of a random variable measures\nby how much the function deviates from the expectation of the function,\nas different values $x$ of the random variable are sampled from its distribution:\n\n$$\\mathrm{Var}[f(x)] = E\\left[\\left(f(x) - E[f(x)]\\right)^2\\right].$$\n\n\n## Summary\n\n* We can sample from probability distributions.\n* We can analyze multiple random variables using joint distribution, conditional distribution, Bayes' theorem, marginalization, and independence assumptions.\n* Expectation and variance offer useful measures to summarize key characteristics of probability distributions.\n\n\n## Exercises\n\n1. We conducted $m=500$ groups of experiments where each group draws $n=10$ samples. Vary $m$ and $n$. Observe and analyze the experimental results.\n1. Given two events with probability $P(\\mathcal{A})$ and $P(\\mathcal{B})$, compute upper and lower bounds on $P(\\mathcal{A} \\cup \\mathcal{B})$ and $P(\\mathcal{A} \\cap \\mathcal{B})$. (Hint: display the situation using a [Venn Diagram](https://en.wikipedia.org/wiki/Venn_diagram).)\n1. Assume that we have a sequence of random variables, say $A$, $B$, and $C$, where $B$ only depends on $A$, and $C$ only depends on $B$, can you simplify the joint probability $P(A, B, C)$? (Hint: this is a [Markov Chain](https://en.wikipedia.org/wiki/Markov_chain).)\n1. In :numref:`subsec_probability_hiv_app`, the first test is more accurate. Why not run the first test twice rather than run both the first and second tests?\n\n\n:begin_tab:`mxnet`\n[Discussions](https://discuss.d2l.ai/t/36)\n:end_tab:\n\n:begin_tab:`pytorch`\n[Discussions](https://discuss.d2l.ai/t/37)\n:end_tab:\n\n:begin_tab:`tensorflow`\n[Discussions](https://discuss.d2l.ai/t/198)\n:end_tab:", "source_start": 659, "source_end": 671, "target_text": "$$\\begin{aligned} &P(H = 1 \\mid D_1 = 1, D_2 = 1)\\\\ =& \\frac{P(D_1 = 1, D_2 = 1 \\mid H=1) P(H=1)}{P(D_1 = 1, D_2 = 1)} \\\\ =& 0.8307. \\end{aligned} $$  Nghĩa là, xét nghiệm thứ hai cho phép chúng ta có được mức độ tin cậy cao hơn nhiều rằng không phải mọi thứ đều ổn. Mặc dù xét nghiệm thứ hai kém chính xác hơn đáng kể so với xét nghiệm đầu tiên, nó vẫn cải thiện đáng kể ước lượng của chúng ta.    ## Kỳ vọng và phương sai  Để tóm tắt các đặc trưng chính của phân phối xác suất, chúng ta cần một số thước đo. *Kỳ vọng* (hay trung bình) của biến ngẫu nhiên $X$ được ký hiệu là  $$E[X] = \\sum_{x} x P(X = x).$$  Khi đầu vào của một hàm $f(x)$ là một biến ngẫu nhiên được lấy từ phân phối $P$ với các giá trị $x$ khác nhau, kỳ vọng của $f(x)$ được tính là  $$E_{x \\sim P}[f(x)] = \\sum_x f(x) P(x).$$   Trong nhiều trường hợp, chúng ta muốn đo xem biến ngẫu nhiên $X$ lệch khỏi kỳ vọng của nó bao nhiêu. Điều này có thể được định lượng bằng phương sai  $$\\mathrm{Var}[X] = E\\left[(X - E[X])^2\\right] = E[X^2] - E[X]^2.$$  Căn bậc hai của nó được gọi là *độ lệch chuẩn*. Phương sai của một hàm của biến ngẫu nhiên đo xem hàm đó lệch khỏi kỳ vọng của hàm bao nhiêu, khi các giá trị $x$ khác nhau của biến ngẫu nhiên được lấy mẫu từ phân phối của nó:  $$\\mathrm{Var}[f(x)] = E\\left[\\left(f(x) - E[f(x)]\\right)^2\\right].$$   ## Tóm tắt  * Chúng ta có thể lấy mẫu từ các phân phối xác suất. * Chúng ta có thể phân tích nhiều biến ngẫu nhiên bằng phân phối đồng thời, phân phối có điều kiện, định lý Bayes, lấy biên, và các giả định về tính độc lập. * Kỳ vọng và phương sai cung cấp các thước đo hữu ích để tóm tắt các đặc trưng chính của phân phối xác suất.   ## Bài tập  1. Chúng ta đã tiến hành $m=500$ nhóm thí nghiệm, trong đó mỗi nhóm lấy $n=10$ mẫu. Hãy thay đổi $m$ và $n$. Quan sát và phân tích kết quả thí nghiệm. 1. Cho hai sự kiện với xác suất $P(\\mathcal{A})$ và $P(\\mathcal{B})$, hãy tính các cận trên và cận dưới của $P(\\mathcal{A} \\cup \\mathcal{B})$ và $P(\\mathcal{A} \\cap \\mathcal{B})$. (Gợi ý: biểu diễn tình huống bằng một [Venn Diagram](https://en.wikipedia.org/wiki/Venn_diagram).) 1. Giả sử rằng chúng ta có một chuỗi các biến ngẫu nhiên, chẳng hạn $A$, $B$, và $C$, trong đó $B$ chỉ phụ thuộc vào $A$, và $C$ chỉ phụ thuộc vào $B$, bạn có thể đơn giản hóa xác suất đồng thời $P(A, B, C)$ không? (Gợi ý: đây là một [Markov Chain](https://en.wikipedia.org/wiki/Markov_chain).) 1. Trong :numref:`subsec_probability_hiv_app`, xét nghiệm đầu tiên chính xác hơn. Tại sao không thực hiện xét nghiệm đầu tiên hai lần thay vì thực hiện cả xét nghiệm thứ nhất và thứ hai?   :begin_tab:`mxnet` [Discussions](https://discuss.d2l.ai/t/36) :end_tab:  :begin_tab:`pytorch` [Discussions](https://discuss.d2l.ai/t/37) :end_tab:  :begin_tab:`tensorflow` [Discussions](https://discuss.d2l.ai/t/198) :end_tab:", "candidates": [{"start": 677, "end": 686, "surface": "phân phối", "role": "collision", "term_ids": ["registry:distribution", "registry:probability distributions"], "form": "phân phối", "credited": false}, {"start": 1227, "end": 1236, "surface": "phân phối", "role": "collision", "term_ids": ["registry:distribution", "registry:probability distributions"], "form": "phân phối", "credited": false}], "gold_label": "rendered", "gold_target_span": "677:686", "annotator_note": "[H]", "_row": {"probe_type": "true_collision", "block_id": "d2l_preliminaries_probability_b069", "chapter": "d2l_preliminaries", "config": "S1", "source_term": "distribution", "source_term_id": "registry:distribution", "source_oc ics of probability distributions.\n\n\n## Exercises\n\n1. We conducted $m=500$ groups of experiments where each group draws $n=10$ samples. Vary $m$ and $n$. Observe and analyze the experimental results.\n1. Given two events with probability $P(\\mathcal{A})$ and $P(\\mathcal{B})$, compute upper and lower bounds on $P(\\mathcal{A} \\cup \\mathcal{B})$ and $P(\\mathcal{A} \\cap \\mathcal{B})$. (Hint: display the situation using a [Venn Diagram](https://en.wikipedia.org/wiki/Venn_diagram).)\n1. Assume that we have a sequence of random variables, say $A$, $B$, and $C$, where $B$ only depends on $A$, and $C$ only depends on $B$, can you simplify the joint probability $P(A, B, C)$? (Hint: this is a [Markov Chain](https://en.wikipedia.org/wiki/Markov_chain).)\n1. In :numref:`subsec_probability_hiv_app`, the first test is more accurate. Why not run the first test twice rather than run both the first and second tests?\n\n\n:begin_tab:`mxnet`\n[Discussions](https://discuss.d2l.ai/t/36)\n:end_tab:\n\n:begin_tab:`pytorch`\n[Discussions](https://discuss.d2l.ai/t/37)\n:end_tab:\n\n:begin_tab:`tensorflow`\n[Discussions](https://discuss.d2l.ai/t/198)\n:end_tab:", "target_text": "$$\\begin{aligned} &P(H = 1 \\mid D_1 = 1, D_2 = 1)\\\\ =& \\frac{P(D_1 = 1, D_2 = 1 \\mid H=1) P(H=1)}{P(D_1 = 1, D_2 = 1)} \\\\ =& 0.8307. \\end{aligned} $$  Nghĩa là, xét nghiệm thứ hai cho phép chúng ta có được mức độ tin cậy cao hơn nhiều rằng không phải mọi thứ đều ổn. Mặc dù xét nghiệm thứ hai kém chính xác hơn đáng kể so với xét nghiệm đầu tiên, nó vẫn cải thiện đáng kể ước lượng của chúng ta.    ## Kỳ vọng và phương sai  Để tóm tắt các đặc trưng chính của phân phối xác suất, chúng ta cần một số thước đo. *Kỳ vọng* (hay trung bình) của biến ngẫu nhiên $X$ được ký hiệu là  $$E[X] = \\sum_{x} x P(X = x).$$  Khi đầu vào của một hàm $f(x)$ là một biến ngẫu nhiên được lấy từ phân phối $P$ với các giá trị $x$ khác nhau, kỳ vọng của $f(x)$ được tính là  $$E_{x \\sim P}[f(x)] = \\sum_x f(x) P(x).$$   Trong nhiều trường hợp, chúng ta muốn đo xem biến ngẫu nhiên $X$ lệch khỏi kỳ vọng của nó bao nhiêu. Điều này có thể được định lượng bằng phương sai  $$\\mathrm{Var}[X] = E\\left[(X - E[X])^2\\right] = E[X^2] - E[X]^2.$$  Căn bậc hai của nó được gọi là *độ lệch chuẩn*. Phương sai của một hàm của biến ngẫu nhiên đo xem hàm đó lệch khỏi kỳ vọng của hàm bao nhiêu, khi các giá trị $x$ khác nhau của biến ngẫu nhiên được lấy mẫu từ phân phối của nó:  $$\\mathrm{Var}[f(x)] = E\\left[\\left(f(x) - E[f(x)]\\right)^2\\right].$$   ## Tóm tắt  * Chúng ta có thể lấy mẫu từ các phân phối xác suất. * Chúng ta có thể phân tích nhiều biến ngẫu nhiên bằng phân phối đồng thời, phân phối có điều kiện, định lý Bayes, lấy biên, và các giả định về tính độc lập. * Kỳ vọng và phương sai cung cấp các thước đo hữu ích để tóm tắt các đặc trưng chính của phân phối xác suất.   ## Bài tập  1. Chúng ta đã tiến hành $m=500$ nhóm thí nghiệm, trong đó mỗi nhóm lấy $n=10$ mẫu. Hãy thay đổi $m$ và $n$. Quan sát và phân tích kết quả thí nghiệm. 1. Cho hai sự kiện với xác suất $P(\\mathcal{A})$ và $P(\\mathcal{B})$, hãy tính các cận trên và cận dưới của $P(\\mathcal{A} \\cup \\mathcal{B})$ và $P(\\mathcal{A} \\cap \\mathcal{B})$. (Gợi ý: biểu diễn tình huống bằng một [Venn Diagram](https://en.wikipedia.org/wiki/Venn_diagram).) 1. Giả sử rằng chúng ta có một chuỗi các biến ngẫu nhiên, chẳng hạn $A$, $B$, và $C$, trong đó $B$ chỉ phụ thuộc vào $A$, và $C$ chỉ phụ thuộc vào $B$, bạn có thể đơn giản hóa xác suất đồng thời $P(A, B, C)$ không? (Gợi ý: đây là một [Markov Chain](https://en.wikipedia.org/wiki/Markov_chain).) 1. Trong :numref:`subsec_probability_hiv_app`, xét nghiệm đầu tiên chính xác hơn. Tại sao không thực hiện xét nghiệm đầu tiên hai lần thay vì thực hiện cả xét nghiệm thứ nhất và thứ hai?   :begin_tab:`mxnet` [Discussions](https://discuss.d2l.ai/t/36) :end_tab:  :begin_tab:`pytorch` [Discussions](https://discuss.d2l.ai/t/37) :end_tab:  :begin_tab:`tensorflow` [Discussions](https://discuss.d2l.ai/t/  related simply based on empirical data?\nThe fields concerned with *causality* and *probabilistic graphical models* address this problem.\n* Another important and exciting recent development in unsupervised learning\nis the advent of *generative adversarial networks*.\nThese give us a procedural way to synthesize data,\neven complicated structured data like images and audio.\nThe underlying statistical mechanisms are tests\nto check whether real and fake data are the same.", "source_start": 1190, "source_end": 1194, "target_text": "* Chúng ta có thể tìm ra một số ít nguyên mẫu để tóm tắt chính xác dữ liệu không? Với một tập ảnh, chúng ta có thể nhóm chúng thành ảnh phong cảnh, ảnh chó, em bé, mèo và đỉnh núi không? Tương tự, với một tập hợp các hoạt động duyệt web của người dùng, chúng ta có thể nhóm họ thành các người dùng có hành vi tương tự không? Bài toán này thường được gọi là *phân cụm*. * Chúng ta có thể tìm ra một số ít tham số để nắm bắt chính xác các thuộc tính liên quan của dữ liệu không? Quỹ đạo của một quả bóng được mô tả khá tốt bởi vận tốc, đường kính và khối lượng của quả bóng. Các thợ may đã phát triển một số ít tham số mô tả hình dạng cơ thể người khá chính xác nhằm mục đích may đo quần áo. Những bài toán này được gọi là *ước lượng không gian con*. Nếu sự phụ thuộc là tuyến tính, nó được gọi là *phân tích thành phần chính*. * Có một biểu diễn của các đối tượng (có cấu trúc tùy ý) trong không gian Euclid sao cho các thuộc tính ký hiệu có thể được khớp tốt không? Điều này có thể được dùng để mô tả các thực thể và các mối quan hệ của chúng, chẳng hạn như \"Rome\" $-$ \"Italy\" $+$ \"France\" $=$ \"Paris\". * Có một mô tả về các nguyên nhân gốc rễ của phần lớn dữ liệu mà chúng ta quan sát được không? Chẳng hạn, nếu chúng ta có dữ liệu nhân khẩu học về giá nhà, ô nhiễm, tội phạm, vị trí, giáo dục và tiền lương, chúng ta có thể khám phá cách chúng liên hệ với nhau chỉ dựa trên dữ liệu thực nghiệm không? Các lĩnh vực liên quan đến *nhân quả* và *mô hình   return esc(text.slice(0,start))+'<mark class="'+cls+'">'+esc(text.slice(start,end))+'</mark>'+esc(text.slice(end)); }
function spanParse(s){const m=String(s||"").match(/^(\d+):(\d+)/);return m?[+m[1],+m[2]]:[-1,-1];}
function isDone(r){const l=(r.gold_label||"").trim(); if(l==="not_rendered"||l==="ambiguous")return true;
  if(l==="rendered")return (r.gold_target_span||"").trim()!==""; return false;}
function statusOf(r){return isDone(r)?"done":"need";}
function renderStats(){
  const done=rows.filter(isDone).length, need=rows.length-done;
  const by={}; rows.forEach(r=>{const k=r.probe_type;by[k]=by[k]||[0,0];by[k][0]++;if(isDone(r))by[k][1]++;});
  let h='<span class="pill ok">done '+done+'</span><span class="pill warn">need '+need+'</span><span class="pill">total '+rows.length+'</span>';
  for(const k in by)h+='<span class="pill">'+k+' '+by[k][1]+'/'+by[k][0]+'</span>';
  document.getElementById("stats").innerHTML=h;
  document.getElementById("filters").innerHTML=
    ['all','need','done','true_collision','variant_stealing','control'].map(f=>
      '<button data-filter="'+f+'"'+(f===filter?' class="primary"':'')+'>'+f+'</button>').join('');
}
function render(){
  renderStats();
  const main=document.getElementById("main"); main.innerHTML="";
  rows.forEach((r,i)=>{
    if(filter==="need"&&isDone(r))return; if(filter==="done"&&!isDone(r))return;
    if(["true_collision","variant_stealing","control"].includes(filter)&&r.probe_type!==filter)return;
    const st=statusOf(r);
    const [gs,ge]=spanParse(r.gold_target_span);
    const cands=r.candidates.map(c=>{
      const sel=(+c.start===gs&&+c.end===ge);
      return '<button class="cand'+(sel?' sel':'')+'" data-cand="'+i+'" data-s="'+c.start+'" data-e="'+c.end+'">'+
        '<code>'+c.start+':'+c.end+'</code> <b>'+esc(c.surface)+'</b> <i style="color:var(--muted)">'+esc(c.role||"")+'</i></button>';
    }).join("");
    const note=r.annotator_note?'<div class="note">'+esc(r.annotator_note)+'</div>':"";
    const lab=(r.gold_label||"").trim();
    const div=document.createElement("div"); div.className="item "+st;
    div.innerHTML=
      '<div class="item-head"><span class="item-title">'+esc(r.source_occ_id)+'</span>'+
        '<span><span class="tag">'+esc(r.probe_type)+'</span> <span class="tag">term: '+esc(r.source_term)+'</span> '+
        '<span class="pill '+(st==="done"?"ok":"warn")+'">'+st+'</span></span></div>'+
      '<div class="grid"><div>'+note+
        '<div class="label">Source (term tô xanh)</div>'+
        '<div class="text-box">'+hl(r.source_text,r.source_start,r.source_end,"source")+'</div></div>'+
        '<div><div class="label">Target output (bôi đen để chọn span)</div>'+
        '<div class="text-box target-box" data-box="'+i+'">'+hl(r.target_text,gs,ge,"gold")+'</div>'+
        '<div class="label">Candidates</div>'+(cands||'<i class="muted">none</i>')+
        '<div class="lblrow"><button data-lab="'+i+'" data-v="rendered" class="'+(lab==="rendered"?"act r":"")+'">rendered</button>'+
          '<button data-lab="'+i+'" data-v="not_rendered" class="'+(lab==="not_rendered"?"act n":"")+'">not_rendered</button>'+
          '<button data-lab="'+i+'" data-v="ambiguous" class="'+(lab==="ambiguous"?"act a":"")+'">ambiguous</button></div>'+
        '<div><span class="label">gold_target_span</span> <input class="spaninput" data-span="'+i+'" value="'+esc(r.gold_target_span)+'">'+
          ' <button data-usesel="'+i+'">Dùng phần bôi đen</button></div>'+
      '</div></div>';
    main.appendChild(div);
  });
  attach();
}
function attach(){
  document.querySelectorAll("[data-cand]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.cand; rows[i].gold_target_span=b.dataset.s+":"+b.dataset.e; rows[i].gold_label="rendered"; render();});
  document.querySelectorAll("[data-lab]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.lab,v=b.dataset.v; rows[i].gold_label=v; if(v!=="rendered")rows[i].gold_target_span=""; render();});
  document.querySelectorAll("[data-span]").forEach(inp=>inp.onchange=()=>{
    const i=+inp.dataset.span; rows[i].gold_target_span=inp.value.trim(); if(rows[i].gold_target_span&&!rows[i].gold_label)rows[i].gold_label="rendered"; render();});
  document.querySelectorAll("[data-usesel]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.usesel; const box=document.querySelector('[data-box="'+i+'"]');
    const sel=window.getSelection(); if(!sel||sel.rangeCount===0||!sel.toString())return;
    const rg=sel.getRangeAt(0); if(!box.contains(rg.commonAncestorContainer))return;
    const pre=rg.cloneRange(); pre.selectNodeContents(box); pre.setEnd(rg.startContainer,rg.startOffset);
    const start=pre.toString().length; const end=start+sel.toString().length;
    rows[i].gold_target_span=start+":"+end; rows[i].gold_label="rendered"; render();});
  document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render();});
}
function csvEsc(v){v=String(v==null?"":v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
document.getElementById("export").onclick=()=>{
  rows.forEach(r=>{r._row.gold_label=r.gold_label;r._row.gold_target_span=r.gold_target_span;r._row.annotator_note=r.annotator_note;});
  const out=[headers.join(",")].concat(rows.map(r=>headers.map(h=>csvEsc(r._row[h])).join(","))).join("\n")+"\n";
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([out],{type:"text/csv;charset=utf-8"}));
  a.download="collision_assignment_gold.csv"; a.click();
};
render();
</script></body></html>
