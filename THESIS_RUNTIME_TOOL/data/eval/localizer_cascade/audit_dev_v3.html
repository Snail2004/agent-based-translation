se_1d6feafbec:S0", "source_term": "elementwise", "source_context": "are the *[[TERM_START]]elementwise[[TERM_END]]* operations.", "target_text": "Cuốn sách này không nói về kỹ nghệ phần mềm. Mối quan tâm của chúng ta không chỉ dừng lại ở việc đọc và ghi dữ liệu từ/đến các mảng. Chúng ta muốn thực hiện các phép toán toán học trên những mảng đó. Một số phép toán đơn giản và hữu ích nhất là các phép toán *theo từng phần tử*. Chúng áp dụng một phép toán vô hướng chuẩn lên từng phần tử của một mảng. Với các hàm nhận hai mảng làm đầu vào, các phép toán theo từng phần tử áp dụng một toán tử nhị phân chuẩn lên từng cặp phần tử tương ứng từ hai mảng. Chúng ta có thể tạo một hàm theo từng phần tử từ bất kỳ hàm nào ánh xạ từ một vô hướng sang một vô hướng.", "gold_quote": "theo từng phần tử", "gold_start": 260, "gold_end": 277, "decision": {"occurrence_id": "occ_e63c8d806c269889", "status": "localized", "classification": "novel", "quote": "theo từng phần tử", "start": 260, "end": 277, "offset_source": "position", "reason": "validated", "from_cache": false, "api_cache_hit": true, "prompt_tokens": 0, "completion_tokens": 0, "cost_usd": 0.0, "system_fingerprint": null}}, {"row_id": "mt_elementwise_multiplication_0ebdbc19e3:S0", "source_term": "elementwise multiplication", "source_context": "[**[[TERM_START]]elementwise multiplication[[TERM_END]] of two matrices is called their *Hadamard product***]", "target_text": "Cụ thể, [**phép nhân theo từng phần tử của hai ma trận được gọi là *tích Hadamard***] (ký hiệu toán học $\u0000odot$). Xét ma trận $\u001b[1mB\u001b[0m \u001b[1m\\in\\mathbb{R}^{m\\times n}\u001b[0m$ có phần tử ở hàng $i$ và cột $j$ là $b_{ij}$. Tích Hadamard của các ma trận $\u001b[1mA\u001b[0m$ (được định nghĩa trong :eqref:`eq_matrix_def`) và $\u001b[1mB\u001b[0m$", "gold_quote": "phép nhân theo từng phần tử", "gold_start": 11, "gold_end": 38, "decision": {"occurrence_id": "occ_71b93eb115efcb4d", "status": "localized", "classification": "novel", "quote": "phép nhân theo từng phần tử của hai ma trận", "start": 11, "end": 54, "offset_source": "unique_quote", "reason": "validated", "from_cache": false, "api_cache_hit": true, "prompt_tokens": 0, "completion_tokens": 0, "cost_usd": 0.0, "system_fingerprint": null}}, {"row_id": "mt_membership_99ef7e9bc5:S0", "source_term": "membership", "source_context": "and simply denotes [[TERM_START]]membership[[TERM_END]] in a set.", "target_text": "Trong cuốn sách này, chúng tôi dùng ký hiệu toán học trong đó các biến vô hướng được biểu diễn bằng các chữ cái thường (ví dụ, $x$, $y$, và $z$). Chúng tôi ký hiệu không gian của tất cả các vô hướng *có giá trị thực* (liên tục) bằng $\\mathbb{R}$. Để tiện lợi, chúng tôi sẽ tạm bỏ qua các định nghĩa chặt chẽ về chính xác *không gian* là gì, nhưng chỉ cần nhớ rằng biểu thức $x \\in \\mathbb{R}$ là một cách hình thức để nói rằng $x$ là một vô hướng có giá trị thực. Ký hiệu $\\in$ có thể được đọc là “thuộc” và đơn giản biểu thị sự thuộc về một tập hợp. Tương tự, ta có thể viết $x, y \\in \\{0, 1\\}$ để nói rằng $x$ và $y$ là các số mà giá trị của chúng chỉ có thể là $0$ hoặc $1$.", "gold_quote": "sự thuộc về", "gold_start": 526, "gold_end": 537, "decision": {"occurrence_id": "occ_fb0ac6fc4433402a", "status": "localized", "classification": "novel", "quote": "sự thuộc về", "start": 526, "end": 537, "offset_source": "unique_quote", "reason": "validated", "from_cache": false, "api_cache_hit": true, "prompt_tokens": 0, "completion_tokens": 0, "cost_usd": 0.0, "system_fingerprint": null}}, {"row_id": "mt_tangent_line_fc8da8d99b:S0", "source_term": "tangent line", "source_context": "This derivative is also the slope of the [[TERM_START]]tangent line[[TERM_END]]", "target_text": "Bây giờ chúng ta có thể áp dụng một vài quy tắc ở trên để tìm $u' = f'(x) = 3 \\frac{d}{dx} x^2-4\\frac{d}{dx}x = 6x-4$. Do đó, khi đặt $x = 1$, ta có $u' = 2$: điều này được hỗ trợ bởi thí nghiệm trước đó của chúng ta trong phần này, nơi kết quả số tiến gần đến $2$. Đạo hàm này cũng
