    const rows = [{"item_id": "mt_fashion_mnist_dataset_b8ddab06eb", "en_sentence": "We will use the similar, but more complex Fashion-MNIST dataset~~)", "en_term": "Fashion-MNIST dataset", "version_A": "(Chúng ta sẽ sử dụng «bộ dữ liệu Fashion-MNIST» tương tự nhưng phức tạp hơn)", "version_B": "Chúng ta sẽ dùng «tập dữ liệu Fashion-MNIST» tương tự nhưng phức tạp hơn~~)", "tier": "preserve", "human_suggested": false}, {"item_id": "mt_mnist_dataset_923cfe4011", "en_sentence": "This is, after all, the source of the famous MNIST dataset of handwritten digits.", "en_term": "MNIST dataset", "version_A": "Rốt cuộc, đây là nguồn gốc của «tập dữ liệu MNIST» nổi tiếng về các chữ số viết tay.", "version_B": "Rốt cuộc, đây chính là nguồn gốc của «bộ dữ liệu MNIST» nổi tiếng về các chữ số viết tay.", "tier": "preserve", "human_suggested": true}, {"item_id": "mt_universal_approximators_c7cc5b991a", "en_sentence": "### Universal Approximators", "en_term": "Universal Approximators", "version_A": "### «Bộ xấp xỉ phổ quát»", "version_B": "### «Bộ xấp xỉ phổ dụng»", "tier": "hard", "human_suggested": false}, {"item_id": "mt_vanishing_and_exploding_gradients_c51a803991", "en_sentence": "* Vanishing and exploding gradients are common issues in deep networks.", "en_term": "Vanishing and Exploding Gradients", "version_A": "* «Độ dốc biến mất và bùng nổ» là các vấn đề phổ biến trong mạng sâu.", "version_B": "* «Gradient biến mất và bùng nổ» là những vấn đề phổ biến trong các mạng sâu.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_activations_9afd89eb88", "en_sentence": "are called *activations*.", "en_term": "activations", "version_A": "Đầu ra của các hàm kích hoạt (ví dụ, $\\sigma(\\cdot)$) được gọi là *«giá trị kích hoạt»*.", "version_B": "Đầu ra của các hàm kích hoạt (ví dụ, $\\sigma(\\cdot)$) được gọi là *«các kích hoạt»*.", "tier": "soft", "human_suggested": false}, {"item_id": "mt_additive_noise_7a444cd8ee", "en_sentence": "Assume that the noise model governing the additive noise $\\epsilon$ is the exponential distribution.", "en_term": "additive noise", "version_A": "Giả sử mô hình nhiễu chi phối «nhiễu cộng» $\\epsilon$ là phân phối mũ.", "version_B": "Giả sử mô hình nhiễu chi phối «nhiễu cộng thêm» $\\epsilon$ là phân phối mũ.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_affine_transformations_e8551c005d", "en_sentence": "For quadratic losses and affine transformations,", "en_term": "affine transformations", "version_A": "Với các hàm mất mát bậc hai và các «biến đổi affine», chúng ta có thể viết rõ ra như sau:", "version_B": "Với các loss bậc hai và các «phép biến đổi affine», ta có thể viết rõ như sau:", "tier": "hard", "human_suggested": false}, {"item_id": "mt_annotation_2e76f54422", "en_sentence": "and grammatical assumptions to get some annotation.", "en_term": "annotation", "version_A": "Nói chung, mục tiêu là phân tách và chú giải văn bản dựa trên các giả định về cấu trúc và ngữ pháp để có được một «chú giải» nào đó.", "version_B": "Nói chung, mục tiêu là phân rã và chú thích văn bản dựa trên các giả định về cấu trúc và ngữ pháp để thu được một dạng «chú thích» nào đó.", "tier": "soft", "human_suggested": false}, {"item_id": "mt_bandits_5d196d3aa2", "en_sentence": "### Bandits", "en_term": "bandits", "version_A": "### «Bài toán băng-đit»", "version_B": "### «Bandit»", "tier": "soft", "human_suggested": true}, {"item_id": "mt_batch_size_115bac8f95", "en_sentence": "If the number of examples cannot be divided by the batch size, what happens to the `data_iter` function's behavior?", "en_term": "batch size", "version_A": "Nếu số lượng ví dụ không thể chia hết cho «kích thước minibatch», điều gì sẽ xảy ra với hành vi của hàm `data_iter`?", "version_B": "Nếu số lượng mẫu không thể chia hết cho «kích thước lô», điều gì sẽ xảy ra với hành vi của hàm `data_iter`?", "tier": "hard", "human_suggested": false}, {"item_id": "mt_covariate_shift_a77c8a8dfb", "en_sentence": "### Covariate Shift", "en_term": "covariate shift", "version_A": "### «Dịch chuyển hiệp biến»", "version_B": "### «Lệch hiệp biến»", "tier": "hard", "human_suggested": false}, {"item_id": "mt_data_examples_7c5e6ddeae", "en_sentence": "If these assumptions held true, then given these two data examples,", "en_term": "data examples", "version_A": "Nếu những giả định này là đúng, thì với hai «mẫu dữ liệu» này, bạn đã có thể xác định cấu trúc định giá của người thợ: 100 đô la mỗi giờ cộng với 50 đô la để đến nhà bạn.", "version_B": "Nếu những giả định này là đúng, thì với hai «ví dụ dữ liệu» này, bạn đã có thể xác định cấu trúc định giá của nhà thầu: 100 đô la mỗi giờ cộng với 50 đô la để đến nhà bạn.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_data_instance_cacbc74d36", "en_sentence": "Each *example* (or *data point*, *data instance*, *sample*) typically consists of a set", "en_term": "data instance", "version_A": "Mỗi *mẫu* (hoặc *điểm dữ liệu*, *«thể hiện dữ liệu»*, *mẫu*) thường bao gồm một tập hợp các thuộc tính gọi là *đặc trưng* (hoặc *biến đồng biến*), từ đó mô hình phải đưa ra dự đoán của mình.", "version_B": "Mỗi *ví dụ* (hoặc *điểm dữ liệu*, *«thực thể dữ liệu»*, *mẫu*) thường gồm một tập các thuộc tính gọi là *đặc trưng* (hoặc *biến đồng biến*), từ đó mô hình phải đưa ra dự đoán của mình.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_deferred_0db493d58e", "en_sentence": "the initialization is actually *deferred*.", "en_term": "deferred", "version_A": "Gluon cho phép điều này vì ở phía sau, việc khởi tạo thực ra được *«hoãn lại»*.", "version_B": "Gluon cho phép chúng ta làm như vậy vì ở phía sau, việc khởi tạo thực ra là *«trì hoãn»*.", "tier": "soft", "human_suggested": false}, {"item_id": "mt_deletion_013e5670c0", "en_sentence": "To handle missing data, typical methods include *imputation* and *deletion*,", "en_term": "deletion", "version_A": "Để xử lý dữ liệu thiếu, các phương pháp điển hình bao gồm *điền khuyết* và *«loại bỏ»*, trong đó điền khuyết thay thế các giá trị thiếu bằng các giá trị được thay thế, còn loại bỏ thì bỏ qua các giá trị thiếu.", "version_B": "Để xử lý dữ liệu thiếu, các phương pháp điển hình bao gồm *điền khuyết* và *«xóa bỏ»*, trong đó điền khuyết thay thế giá trị thiếu bằng các giá trị thay thế, còn xóa bỏ thì bỏ qua giá trị thiếu.", "tier": "soft", "human_suggested": true}, {"item_id": "mt_efficiency_fff33dfb39", "en_sentence": "To improve computational efficiency and take advantage of GPUs,", "en_term": "efficiency", "version_A": "Để cải thiện «hiệu quả» tính toán và tận dụng GPU, chúng ta thường thực hiện các phép tính vector cho các minibatch dữ liệu.", "version_B": "Để cải thiện «tính hiệu quả» tính toán và tận dụng GPU, chúng ta thường thực hiện các phép tính vector cho các minibatch dữ liệu.", "tier": "soft", "human_suggested": false}, {"item_id": "mt_elementwise_1d6feafbec", "en_sentence": "are the *elementwise* operations.", "en_term": "elementwise", "version_A": "Một số phép toán đơn giản và hữu ích nhất là các phép toán *«theo từng phần tử»*.", "version_B": "Một số phép toán đơn giản nhất và hữu ích nhất là các phép toán *«theo phần tử»*.", "tier": "soft", "human_suggested": false}, {"item_id": "mt_elementwise_multiplication_0ebdbc19e3", "en_sentence": "[**elementwise multiplication of two matrices is called their *Hadamard product***]", "en_term": "elementwise multiplication", "version_A": "Cụ thể, [**«phép nhân theo phần tử» của hai ma trận được gọi là *tích Hadamard***] (ký hiệu toán học $\\odot$).", "version_B": "Cụ thể, [**«phép nhân theo từng phần tử» của hai ma trận được gọi là *tích Hadamard***] (ký hiệu toán học $\u0000odot$).", "tier": "hard", "human_suggested": false}, {"item_id": "mt_end_to_end_training_e0ecc93532", "en_sentence": "Arguably the most significant commonality in deep learning methods is the use of *end-to-end training*.", "en_term": "end-to-end training", "version_A": "Có lẽ điểm chung quan trọng nhất trong các phương pháp học sâu là việc sử dụng *«huấn luyện đầu cuối»*.", "version_B": "Có lẽ điểm chung quan trọng nhất trong các phương pháp học sâu là việc sử dụng *«huấn luyện đầu-cuối»*.", "tier": "hard", "human_suggested": true}, {"item_id": "mt_feature_engineering_fbcf9d9a88", "en_sentence": "For instance, in computer vision scientists used to separate the process of *feature engineering* from the process of building machine learning models.", "en_term": "feature engineering", "version_A": "Chẳng hạn, trong thị giác máy tính, các nhà khoa học trước đây thường tách quá trình *«kỹ thuật đặc trưng»* khỏi quá trình xây dựng mô hình học máy.", "version_B": "Chẳng hạn, trong thị giác máy tính, trước đây các nhà khoa học thường tách quá trình *«thiết kế đặc trưng»* khỏi quá trình xây dựng các mô hình học máy.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_feature_selection_ec5e3cb404", "en_sentence": "This is called *feature selection*,", "en_term": "feature selection", "version_A": "Điều này được gọi là *«lựa chọn đặc trưng»*, và có thể hữu ích vì những lý do khác.", "version_B": "Điều này được gọi là *«chọn đặc trưng»*, vốn có thể mong muốn vì những lý do khác.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_feature_vectors_9cfc7e31ab", "en_sentence": "2004` reigned supreme for over a decade as algorithms for mapping images into feature vectors.", "en_term": "feature vectors", "version_A": "2004` đã thống trị trong hơn một thập kỷ như các thuật toán ánh xạ ảnh thành các «vector đặc trưng».", "version_B": "2004` đã thống trị trong hơn một thập kỷ như các thuật toán để ánh xạ ảnh thành các «vectơ đặc trưng».", "tier": "hard", "human_suggested": true}, {"item_id": "mt_feedback_loops_73b8202c83", "en_sentence": "Thus it is possible for feedback loops to form", "en_term": "feedback loops", "version_A": "Vì vậy, có thể hình thành các «vòng phản hồi», trong đó một hệ thống gợi ý ưu tiên đẩy một mục lên, rồi mục đó lại được xem là tốt hơn (do được mua nhiều hơn) và đến lượt nó lại được gợi ý thường xuyên hơn.", "version_B": "Vì vậy, có thể hình thành các «vòng lặp phản hồi», trong đó một hệ thống gợi ý ưu tiên đẩy một mục lên, rồi mục đó lại được xem là tốt hơn (do được mua nhiều hơn), và đến lượt nó lại được gợi ý thường xuyên hơn.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_framework_f178867da2", "en_sentence": "No matter which framework you use,", "en_term": "framework", "version_A": "Dù bạn dùng «khung phần mềm» nào, *lớp tensor* của nó (`ndarray` trong MXNet, `Tensor` trong cả PyTorch và TensorFlow) đều tương tự `ndarray` của NumPy với một vài tính năng nổi bật.", "version_B": "Dù bạn dùng «framework» nào, *lớp tensor* của nó (`ndarray` trong MXNet, `Tensor` trong cả PyTorch và TensorFlow) đều tương tự `ndarray` của NumPy với một vài tính năng nổi bật.", "tier": "soft", "human_suggested": false}, {"item_id": "mt_generalization_gap_29c7c2502f", "en_sentence": "we expect the training error to go down but the generalization gap to grow.", "en_term": "generalization gap", "version_A": "Khi làm việc với các mô hình phức tạp hơn và ít ví dụ hơn, ta kỳ vọng sai số huấn luyện sẽ giảm nhưng «khoảng cách khái quát hóa» sẽ tăng.", "version_B": "Khi làm việc với các mô hình phức tạp hơn và ít mẫu hơn, ta kỳ vọng lỗi huấn luyện sẽ giảm nhưng «khoảng cách tổng quát hóa» sẽ tăng.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_heuristics_a628d3bfd9", "en_sentence": "Many of the techniques in deep learning are heuristics and tricks", "en_term": "heuristics", "version_A": "Nhiều kỹ thuật trong học sâu là các «phương pháp heuristic» và mẹo nhằm bảo vệ chống lại quá khớp.", "version_B": "Nhiều kỹ thuật trong học sâu là các «kinh nghiệm» và mẹo nhằm bảo vệ khỏi hiện tượng quá khớp.", "tier": "soft", "human_suggested": false}, {"item_id": "mt_learnable_parameters_11a624f504", "en_sentence": "increasing the number of learnable parameters.", "en_term": "learnable parameters", "version_A": "* Các phương pháp mới để điều khiển năng lực, chẳng hạn như *dropout*   :cite:`Srivastava.Hinton.Krizhevsky.ea.2014`,   đã giúp giảm thiểu nguy cơ quá khớp.   Điều này đạt được bằng cách áp dụng tiêm nhiễu :cite:`Bishop.1995`   xuyên suốt mạng nơ-ron, thay thế trọng số bằng các biến ngẫu nhiên   cho mục đích huấn luyện. * Các cơ chế chú ý đã giải quyết một vấn đề thứ hai   đã làm khổ thống kê trong hơn một thế kỷ:   làm thế nào để tăng bộ nhớ và độ phức tạp của một hệ thống mà không   làm tăng số lượng «tham số học được».   Các nhà nghiên cứu đã tìm ra một giải pháp thanh lịch   bằng cách sử dụng cái chỉ có thể được xem như một cấu trúc con trỏ có thể học được :cite:`Bahdanau.Cho.Bengio.2014`.   Thay vì phải ghi nhớ toàn bộ một chuỗi văn bản, ví dụ,   cho dịch máy trong một biểu diễn có số chiều cố định,   tất cả những gì cần lưu trữ chỉ là một con trỏ tới trạng thái trung gian   của quá trình dịch. Điều này cho phép tăng đáng kể độ chính xác   đối với các chuỗi dài, vì mô hình   không còn cần phải ghi nhớ toàn bộ chuỗi trước khi   bắt đầu tạo ra một chuỗi mới. * Các thiết kế nhiều giai đoạn, ví dụ, thông qua memory networks    :cite:`Sukhbaatar.Weston.Fergus.ea.2015` và neural programmer-interpreter :cite:`Reed.De-Freitas.2015`   đã cho phép các nhà mô hình hóa thống kê mô tả các cách tiếp cận suy luận lặp đi lặp lại. Các công cụ này cho phép trạng thái bên trong của mạng nơ-ron sâu   được sửa đổi nhiều lần, qua đó thực hiện các bước tiếp theo   trong một chuỗi suy luận, tương tự như cách một bộ xử lý   có thể sửa đổi bộ nhớ cho một tính toán. * Một phát triển then chốt khác là sự ra đời của mạng đối nghịch sinh   :cite:`Goodfellow.Pouget-Abadie.Mirza.ea.2014`.   Theo truyền thống, các phương pháp thống kê cho ước lượng mật độ   và mô hình sinh tập trung vào việc tìm các phân phối xác suất phù hợp   và các thuật toán (thường là xấp xỉ) để lấy mẫu từ chúng.   Kết quả là, các thuật toán này phần lớn bị giới hạn bởi sự thiếu   linh hoạt vốn có trong các mô hình thống kê.   Đổi mới then chốt trong mạng đối nghịch sinh là thay bộ lấy mẫu   bằng một thuật toán tùy ý với các tham số khả vi.   Sau đó, các tham số này được điều chỉnh sao cho bộ phân biệt   (về thực chất là một kiểm định hai mẫu) không thể phân biệt dữ liệu giả với dữ liệu thật.   Thông qua khả năng sử dụng các thuật toán tùy ý để tạo dữ liệu,   nó đã mở rộng ước lượng mật độ sang một loạt kỹ thuật rất đa dạng.   Các ví dụ về ngựa vằn phi nước đại :cite:`Zhu.Park.Isola.ea.2017`   và về khuôn mặt người nổi tiếng giả :cite:`Karras.Aila.Laine.ea.2017`   đều là minh chứng cho tiến bộ này.   Ngay cả những người vẽ nguệch ngoạc nghiệp dư cũng có thể tạo ra   ảnh chân thực dựa chỉ trên các bản phác thảo mô tả   bố cục của một cảnh trông như thế nào :cite:`Park.Liu.Wang.ea.2019`. * Trong nhiều trường hợp, một GPU đơn lẻ là không đủ để xử lý   lượng dữ liệu lớn sẵn có cho huấn luyện.   Trong thập kỷ qua, khả năng xây dựng các thuật toán huấn luyện song song và   phân tán đã được cải thiện đáng kể.   Một trong những thách thức chính khi thiết kế các thuật toán có khả năng mở rộng   là công cụ chủ lực của tối ưu hóa học sâu,   hạ gradient ngẫu nhiên, phụ thuộc vào các mini lô dữ liệu tương đối   nhỏ để được xử lý.   Đồng thời, các lô nhỏ làm hạn chế hiệu quả của GPU.   Vì vậy, huấn luyện trên 1024 GPU với kích thước minibatch,   chẳng hạn 32 ảnh mỗi lô, tương đương với một minibatch tổng hợp   khoảng 32000 ảnh. Các công trình gần đây, đầu tiên bởi Li :cite:`Li.2017`,   và sau đó bởi :cite:`You.Gitman.Ginsburg.2017`   và :cite:`Jia.Song.He.ea.2018` đã nâng kích thước lên 64000 quan sát,   giảm thời gian huấn luyện cho mô hình ResNet-50 trên tập dữ liệu ImageNet xuống dưới 7 phút.   Để so sánh---ban đầu thời gian huấn luyện được đo theo đơn vị ngày. * Khả năng song song hóa tính toán cũng đã đóng góp cực kỳ quan trọng   vào tiến bộ trong học tăng cường, ít nhất là bất cứ khi nào mô phỏng là một   lựa chọn. Điều này đã dẫn đến tiến bộ đáng kể trong việc máy tính đạt được   hiệu năng vượt con người trong Go, các trò chơi Atari, Starcraft, và trong các   mô phỏng vật lý (ví dụ, sử dụng MuJoCo). Xem ví dụ,   :cite:`Silver.Huang.Maddison.ea.2016` để biết mô tả   về cách đạt được điều này trong AlphaGo. Nói ngắn gọn,   học tăng cường hoạt động tốt nhất nếu có sẵn nhiều bộ ba (trạng thái, hành động, phần thưởng), tức là, bất cứ khi nào có thể thử nhiều thứ để học cách chúng liên hệ với nhau. Mô phỏng cung cấp một con đường như vậy. * Các khung học sâu đã đóng vai trò then chốt   trong việc phổ biến các ý tưởng. Thế hệ đầu tiên của các khung cho phép mô hình hóa dễ dàng bao gồm   [Caffe](https://github.com/BVLC/caffe),   [Torch](https://github.com/torch), và   [Theano](https://github.com/Theano/Theano).   Nhiều bài báo nền tảng đã được viết bằng các công cụ này.   Đến nay, chúng đã được thay thế bởi   [TensorFlow](https://github.com/tensorflow/tensorflow) (thường được dùng thông qua API cấp cao [Keras](https://github.com/keras-team/keras)), [CNTK](https://github.com/Microsoft/CNTK), [Caffe 2](https://github.com/caffe2/caffe2), và [Apache MXNet](https://github.com/apache/incubator-mxnet). Thế hệ công cụ thứ ba, cụ thể là các công cụ mệnh lệnh cho học sâu,   có thể nói đã được tiên phong bởi [Chainer](https://github.com/chainer/chainer),   vốn dùng cú pháp tương tự Python NumPy để mô tả các mô hình.   Ý tưởng này đã được cả [PyTorch](https://github.com/pytorch/pytorch),   [Gluon API](https://github.com/apache/incubator-mxnet) của MXNet, và [Jax](https://github.com/google/jax) tiếp nhận.", "version_B": "* Cơ chế chú ý đã giải quyết một vấn đề thứ hai vốn đã làm khổ ngành thống kê trong hơn một thế kỷ: làm thế nào để tăng bộ nhớ và độ phức tạp của một hệ thống mà không làm tăng số lượng «tham số có thể học».", "tier": "hard", "human_suggested": true}, {"item_id": "mt_lifting_8f516a1fc1", "en_sentence": "by *lifting* the scalar function to an elementwise vector operation.", "en_term": "lifting", "version_A": "Ở đây, chúng ta đã tạo ra hàm có giá trị vector $F: \\mathbb{R}^d, \\mathbb{R}^d \\rightarrow \\mathbb{R}^d$ bằng cách *« b5992a4c", "en_sentence": "Then for any training example $i$ with label $y_i$,", "en_term": "training example", "version_A": "Khi đó với bất kỳ «mẫu huấn luyện» $i$ nào có nhãn $y_i$, chúng ta có thể lấy tỷ số giữa $p(y_i)/q(y_i)$ đã ước lượng để tính trọng số $\\beta_i$, và đưa nó vào tối thiểu hóa rủi ro thực nghiệm có trọng số trong :eqref:`eq_weighted-empirical-risk-min`.", "version_B": "Khi đó với bất kỳ «ví dụ huấn luyện» $i$ nào có nhãn $y_i$, chúng ta có thể lấy tỉ số $p(y_i)/q(y_i)$ đã ước lượng để tính trọng số $\\beta_i$, và đưa giá trị này vào tối thiểu hóa rủi ro thực nghiệm có trọng số trong :eqref:`eq_weighted-empirical-risk-min`.", "tier": "hard", "human_suggested": true}, {"item_id": "mt_training_examples_79bcf24974", "en_sentence": "for each constituent of a *batch* of training examples.", "en_term": "training examples", "version_A": "Tuy nhiên, mặc dù những đối tượng kỳ lạ hơn này có xuất hiện trong học máy nâng cao (bao gồm [**trong học sâu**]), thường hơn (**khi chúng ta gọi backward trên một vector,**) chúng ta đang cố gắng tính các đạo hàm của các hàm mất mát cho từng phần tử của một *lô* «mẫu huấn luyện».", "version_B": "Tuy nhiên, mặc dù những đối tượng kỳ lạ hơn này có xuất hiện trong học máy nâng cao (bao gồm [**trong học sâu**]), thường hơn (**khi chúng ta gọi backward trên một vector,**) chúng ta đang cố tính các đạo hàm của các hàm mất mát cho từng phần tử cấu thành của một *batch* các «ví dụ huấn luyện».", "tier": "hard", "human_suggested": false}, {"item_id": "mt_true_parameters_6636cf5533", "en_sentence": "we know precisely what the true parameters are.", "en_term": "true parameters", "version_A": "Trong trường hợp này, vì chúng ta tự tạo ra tập dữ liệu, nên chúng ta biết chính xác «tham số thực» là gì.", "version_B": "Trong trường hợp này, vì chúng ta tự tạo ra tập dữ liệu, nên chúng ta biết chính xác các «tham số thật» là gì.", "tier": "hard", "human_suggested": false}, {"item_id": "mt_true_probability_0c04e78467", "en_sentence": "Specifically, we calculate the relative frequency as the estimate of the true probability.", "en_term": "true probability", "version_A": "Cụ thể, chúng ta tính tần suất tương đối như là ước lượng của «xác suất thực».", "version_B": "Cụ thể, chúng ta tính tần suất tương đối như là ước lượng của «xác suất thật».", "tier": "hard", "human_suggested": false}];
    const root = document.getElementById("items");
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[ch]);
    }
    function marked(value) {
      return escapeHtml(value).replaceAll("«", "<mark>").replaceAll("»", "</mark>");
    }
    for (const row of rows) {
      const div = document.createElement("section");
      div.className = "item" + (row.human_suggested ? " suggested" : "");
      div.innerHTML = `
        <h2>${escapeHtml(row.item_id)} ${row.human_suggested ? '<span class="muted">suggested subset</span>' : ''}</h2>
        <p><strong>EN term:</strong> ${escapeHtml(row.en_term)}</p>
        <p><strong>EN source:</strong> ${escapeHtml(row.en_sentence)}</p>
        <p><strong>Version A</strong></p><div class="version">${marked(row.version_A)}</div>
        <p><strong>Version B</strong></p><div class="version">${marked(row.version_B)}</div>
        <label><input type="radio" name="${row.item_id}" value="A_better"> A better</label>
        <label><input type="radio" name="${row.item_id}" value="equivalent"> Equivalent</label>
        <label><input type="radio" name="${row.item_id}" value="B_better"> B better</label>
        <p><textarea data-note="${row.item_id}" rows="2" style="width:100%" placeholder="optional note"></textarea></p>
      `;
      root.appendChild(div);
    }
    document.getElementById("export").addEventListener("click", () => {
      const judgments = [];
      for (const row of rows) {
        const checked = document.querySelector(`input[name="${row.item_id}"]:checked`);
        if (!checked) continue;
        const note = document.querySelector(`textarea[data-note="${row.item_id}"]`).value || "";
        judgments.push({item_id: row.item_id, human_label: checked.value, note});
      }
      const blob = new Blob([JSON.stringify({items: judgments}, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "judgments_human.json";
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
